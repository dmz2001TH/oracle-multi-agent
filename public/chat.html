<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — Oracle Multi-Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --surface2: #18181f;
      --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.10);
      --text: rgba(255,255,255,0.95); --muted: rgba(255,255,255,0.25);
      --dim: rgba(255,255,255,0.15);
      --accent: #64b5f6; --human: #e8b86d;
      --green: #22c55e; --red: #ef4444; --yellow: #eab308;
    }
    body { font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

    /* ─── Sidebar ─── */
    .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .sidebar-header h2 { font-size: 14px; font-weight: 700; color: var(--accent); }
    .sidebar-header .badge { font-size: 10px; background: rgba(100,181,246,0.15); color: var(--accent); padding: 2px 6px; border-radius: 8px; }

    .nav { display: flex; gap: 4px; padding: 8px 12px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .nav a { padding: 4px 10px; border-radius: 6px; text-decoration: none; color: var(--muted); font-size: 11px; transition: all 0.2s; }
    .nav a:hover { color: var(--text); background: var(--surface2); }
    .nav a.active { color: var(--accent); background: rgba(100,181,246,0.12); }

    .agent-list { flex: 1; overflow-y: auto; padding: 8px; }
    .agent-card {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px; cursor: pointer;
      transition: all 0.2s; margin-bottom: 4px;
    }
    .agent-card:hover { background: var(--surface2); }
    .agent-card.active { background: rgba(100,181,246,0.12); border: 1px solid rgba(100,181,246,0.2); }
    .agent-card .name { font-size: 13px; font-weight: 600; flex: 1; }
    .agent-card .role { font-size: 10px; color: var(--muted); }
    .agent-card .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.active { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.5); }
    .dot.idle { background: var(--yellow); }
    .agent-card .msg-count { font-size: 9px; background: var(--accent); color: #fff; padding: 1px 5px; border-radius: 8px; }

    .spawn-area { padding: 10px 12px; border-top: 1px solid var(--border); }
    .spawn-area input, .spawn-area select {
      width: 100%; padding: 6px 10px; border-radius: 6px;
      border: 1px solid var(--border2); background: var(--bg); color: var(--text);
      font-size: 12px; font-family: inherit; margin-bottom: 6px; outline: none;
    }
    .spawn-area input:focus, .spawn-area select:focus { border-color: var(--accent); }
    .spawn-btn {
      width: 100%; padding: 7px; border-radius: 6px; border: none;
      background: rgba(100,181,246,0.15); color: var(--accent);
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .spawn-btn:hover { background: rgba(100,181,246,0.25); }

    /* ─── Chat Area ─── */
    .chat { flex: 1; display: flex; flex-direction: column; }
    .chat-header {
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.015);
    }
    .chat-header .title { font-size: 15px; font-weight: 700; flex: 1; }
    .chat-header .subtitle { font-size: 11px; color: var(--muted); }
    .mode-tabs { display: flex; gap: 4px; }
    .mode-tab {
      padding: 4px 12px; border-radius: 6px; font-size: 11px; cursor: pointer;
      color: var(--muted); transition: all 0.2s; border: none; background: none; font-family: inherit;
    }
    .mode-tab:hover { color: var(--text); }
    .mode-tab.active { color: var(--accent); background: rgba(100,181,246,0.12); }

    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    /* ─── Chat Bubble ─── */
    .msg-group { display: flex; gap: 10px; max-width: 82%; }
    .msg-group.right { flex-direction: row-reverse; align-self: flex-end; }
    .msg-group .bubble-col { min-width: 0; flex: 1; display: flex; flex-direction: column; gap: 4px; }

    .msg-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
    .msg-group.right .msg-meta { flex-direction: row-reverse; }
    .msg-name { font-size: 13px; font-weight: 700; }
    .msg-tag { font-size: 9px; padding: 1px 6px; border-radius: 4px; }
    .msg-tag.ai { background: rgba(100,181,246,0.10); color: rgba(100,181,246,0.5); }
    .msg-tag.human { background: rgba(232,184,109,0.15); color: #e8b86d; }
    .msg-time { font-size: 10px; color: var(--dim); font-family: monospace; }
    .msg-count-badge { font-size: 9px; color: var(--dim); font-family: monospace; }

    .bubble {
      padding: 10px 16px; font-size: 14.5px; line-height: 1.7;
      border-radius: 4px 18px 18px 18px; white-space: pre-wrap; word-break: break-word;
      color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08); cursor: pointer;
      transition: all 0.2s;
    }
    .bubble:hover { border-color: rgba(255,255,255,0.15); }
    .msg-group.right .bubble { border-radius: 18px 4px 18px 18px; }
    .bubble.first { border-radius: 4px 18px 6px 18px; }
    .msg-group.right .bubble.first { border-radius: 18px 4px 18px 6px; }
    .bubble.last { border-radius: 6px 18px 18px 18px; }
    .msg-group.right .bubble.last { border-radius: 18px 6px 18px 18px; }
    .bubble.cmd { background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.2); }
    .bubble.highlighted { box-shadow: 0 0 20px rgba(100,181,246,0.15); border-color: rgba(100,181,246,0.3); }

    /* ─── Date Separator ─── */
    .date-sep { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
    .date-sep::before, .date-sep::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .date-sep span { font-size: 10px; color: var(--dim); font-family: monospace; letter-spacing: 0.5px; }

    /* ─── Thread Card ─── */
    .thread-card {
      border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden; background: rgba(255,255,255,0.015);
    }
    .thread-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; cursor: pointer;
    }
    .thread-header:hover { background: rgba(255,255,255,0.02); }
    .thread-header .pair { flex: 1; }
    .thread-header .pair-names { font-size: 12px; font-weight: 700; }
    .thread-header .pair-preview { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .thread-body { padding: 8px 12px; display: flex; flex-direction: column; gap: 10px; }

    /* ─── Input ─── */
    .input-area {
      padding: 12px 20px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; background: var(--surface);
    }
    .input-area input {
      flex: 1; padding: 10px 14px; border-radius: 10px;
      border: 1px solid var(--border2); background: var(--bg); color: var(--text);
      font-size: 14px; font-family: inherit; outline: none;
    }
    .input-area input:focus { border-color: var(--accent); }
    .input-area button {
      padding: 10px 20px; border-radius: 10px; border: none;
      background: var(--accent); color: #000; font-size: 13px;
      font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .input-area button:hover { opacity: 0.9; }

    /* ─── Chibi Avatar SVG ─── */
    .chibi { flex-shrink: 0; }

    /* ─── Empty state ─── */
    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); gap: 8px; }
    .empty .icon { font-size: 48px; }
    .empty .text { font-size: 14px; }

    /* ─── Welcome ─── */
    .welcome { text-align: center; padding: 40px 20px; }
    .welcome h3 { font-size: 18px; margin-bottom: 8px; }
    .welcome p { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .welcome code { background: rgba(100,181,246,0.1); padding: 2px 6px; border-radius: 4px; font-size: 12px; color: var(--accent); }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 1.5s infinite; }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>💬 Chat</h2>
      <span class="badge" id="agent-count">0</span>
    </div>
    <div class="nav">
      <a href="/">Home</a>
      <a href="/agents">Agents</a>
      <a href="/chat" class="active">Chat</a>
      <a href="/federation">Federation</a>
      <a href="/vault">Vault</a>
    </div>
    <div class="agent-list" id="agent-list"></div>
    <div class="spawn-area">
      <input id="spawn-name" placeholder="Agent name...">
      <select id="spawn-role">
        <option value="general">General</option>
        <option value="researcher">Researcher</option>
        <option value="coder">Coder</option>
        <option value="writer">Writer</option>
        <option value="manager">Manager</option>
        <option value="data-analyst">Data Analyst</option>
      </select>
      <button class="spawn-btn" onclick="spawnAgent()">⚡ สร้าง Agent</button>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat">
    <div class="chat-header">
      <span id="chat-title" class="title">💬 Oracle Chat</span>
      <span id="chat-info" class="subtitle"></span>
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="bubble" onclick="setMode('bubble')">Bubble</button>
        <button class="mode-tab" data-mode="timeline" onclick="setMode('timeline')">Timeline</button>
        <button class="mode-tab" data-mode="threads" onclick="setMode('threads')">Threads</button>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input id="chat-input" placeholder="พิมพ์ข้อความ หรือ /คำสั่ง..." onkeydown="if(event.key==='Enter')sendChat()">
      <button onclick="sendChat()">ส่ง</button>
    </div>
  </div>

<script>
const API = location.origin;
const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';

let agents = [];
let selectedAgent = null;
let viewMode = 'bubble'; // bubble | timeline | threads
let chatBuffers = {};    // { agentId: [{role, text, ts, isCmd}] }
let allMessages = [];    // flat list for timeline/threads view
let highlighted = null;

// ═══════════════════════════════════════════════════════════════
// Chibi Avatar — cute SVG robot face (deterministic by name)
// ═══════════════════════════════════════════════════════════════
const AGENT_COLORS = [
  '#ff6b6b','#4ecdc4','#45b7d1','#96ceb4','#ffa07a',
  '#dda0dd','#98d8c8','#f7dc6f','#bb8fce','#85c1e9','#f0b27a','#82e0aa'
];

function nameHash(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0;
  return Math.abs(h);
}

function agentColor(name) {
  return AGENT_COLORS[nameHash(name) % AGENT_COLORS.length];
}

function isHuman(name) { return name === 'user' || name === 'human' || name === 'nat'; }

function chibiAvatar(name, size = 36) {
  const color = isHuman(name) ? '#e8b86d' : agentColor(name);
  const h = nameHash(name);
  const hasEars = h % 3 === 0;
  const hasAntenna = !hasEars && h % 3 === 1;
  const eyeStyle = (h >> 4) % 3;

  if (isHuman(name)) {
    return `<svg class="chibi" width="${size}" height="${size}" viewBox="-25 -35 50 50">
      <circle cx="0" cy="-10" r="20" fill="#e8b86d" stroke="#fff" stroke-width="1.5"/>
      <ellipse cx="0" cy="-24" rx="16" ry="8" fill="#2c1b0e"/>
      <circle cx="-7" cy="-12" r="3.5" fill="#fff"/><circle cx="7" cy="-12" r="3.5" fill="#fff"/>
      <circle cx="-6" cy="-12" r="2" fill="#1a1a1a"/><circle cx="8" cy="-12" r="2" fill="#1a1a1a"/>
      <circle cx="-5" cy="-13" r="0.8" fill="#fff"/><circle cx="9" cy="-13" r="0.8" fill="#fff"/>
      <path d="M-4 -4 Q0 -1 4 -4" fill="none" stroke="#333" stroke-width="1.2" stroke-linecap="round"/>
    </svg>`;
  }

  let extras = '';
  if (hasEars) {
    extras += `<polygon points="-14,-24 -18,-36 -6,-28" fill="${color}" stroke="#fff" stroke-width="1.2"/>`;
    extras += `<polygon points="14,-24 18,-36 6,-28" fill="${color}" stroke="#fff" stroke-width="1.2"/>`;
  }
  if (hasAntenna) {
    extras += `<line x1="0" y1="-30" x2="0" y2="-40" stroke="#888" stroke-width="1.5"/>`;
    extras += `<circle cx="0" cy="-42" r="3" fill="${color}" opacity="0.8"/>`;
  }

  let eyes = '';
  if (eyeStyle === 0) {
    eyes = `<circle cx="-7" cy="-12" r="4.5" fill="#fff"/><circle cx="7" cy="-12" r="4.5" fill="#fff"/>
            <circle cx="-6" cy="-12" r="2.5" fill="#222"/><circle cx="8" cy="-12" r="2.5" fill="#222"/>
            <circle cx="-5" cy="-13.5" r="1" fill="#fff"/><circle cx="9" cy="-13.5" r="1" fill="#fff"/>`;
  } else if (eyeStyle === 1) {
    eyes = `<path d="M-10 -12 Q-7 -15 -4 -12" fill="none" stroke="#222" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M4 -12 Q7 -15 10 -12" fill="none" stroke="#222" stroke-width="1.8" stroke-linecap="round"/>`;
  } else {
    eyes = `<circle cx="-7" cy="-12" r="4.5" fill="#fff"/><circle cx="7" cy="-12" r="4.5" fill="#fff"/>
            <text x="-7" y="-9.5" text-anchor="middle" fill="${color}" font-size="7" font-weight="bold">*</text>
            <text x="7" y="-9.5" text-anchor="middle" fill="${color}" font-size="7" font-weight="bold">*</text>`;
  }

  return `<svg class="chibi" width="${size}" height="${size}" viewBox="-25 -35 50 50">
    <circle cx="0" cy="-10" r="20" fill="${color}" stroke="#fff" stroke-width="1.5"/>
    <ellipse cx="-4" cy="-28" rx="6" ry="4" fill="${color}" stroke="#fff" stroke-width="0.8"/>
    <ellipse cx="4" cy="-29" rx="5" ry="3" fill="${color}" stroke="#fff" stroke-width="0.8"/>
    ${extras}${eyes}
    <ellipse cx="-12" cy="-7" rx="3" ry="2" fill="#ff9999" opacity="0.25"/>
    <ellipse cx="12" cy="-7" rx="3" ry="2" fill="#ff9999" opacity="0.25"/>
    <path d="M-3 -5 Q0 -2 3 -5" fill="none" stroke="#333" stroke-width="1.2" stroke-linecap="round"/>
  </svg>`;
}

// ═══════════════════════════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════════════════════════
function formatTime(ts) {
  return new Date(ts).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
}
function formatDate(ts) {
  return new Date(ts).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
}
function escapeHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
function displayName(name) {
  return (name || 'unknown').replace(/-oracle$/, '').replace(/-mawjs$/, '');
}
function pairKey(a, b) { return a < b ? `${a}↔${b}` : `${b}↔${a}`; }

// ═══════════════════════════════════════════════════════════════
// Chat Buffer
// ═══════════════════════════════════════════════════════════════
const SYS_KEY = '__system__';

function getBuffer(key) {
  if (!chatBuffers[key]) chatBuffers[key] = [];
  return chatBuffers[key];
}

function pushMsg(agentId, role, text, isCmd, skipSave) {
  const key = agentId || SYS_KEY;
  const buf = getBuffer(key);
  const entry = { role, text, ts: new Date().toISOString(), isCmd: !!isCmd };
  buf.push(entry);
  allMessages.push({ from: role === 'user' ? 'user' : key, to: key, msg: text, ts: entry.ts, agentId: key });
  if (!skipSave) {
    fetch(`${API}/api/chat/${key}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ role, content: text }),
    }).catch(() => {});
  }
  return entry;
}

async function loadChatHistory(agentId) {
  const key = agentId || SYS_KEY;
  if (chatBuffers[key]?.length > 0) return;
  try {
    const res = await fetch(`${API}/api/chat/${key}?limit=200`);
    const data = await res.json();
    if (data.messages?.length > 0) {
      chatBuffers[key] = data.messages.map(m => ({
        role: m.role || 'oracle', text: m.content || m.text || '',
        ts: m.ts || new Date().toISOString(), isCmd: false,
      }));
      for (const m of data.messages) {
        allMessages.push({ from: m.role === 'user' ? 'user' : key, to: key, msg: m.content || '', ts: m.ts, agentId: key });
      }
    }
  } catch {}
}

// ═══════════════════════════════════════════════════════════════
// Render — Bubble View (Soul Brews style)
// ═══════════════════════════════════════════════════════════════
function renderBubble() {
  const el = document.getElementById('messages');
  const key = selectedAgent || SYS_KEY;
  const buf = getBuffer(key);
  if (buf.length === 0) { renderWelcome(); return; }

  // Group consecutive messages from same sender
  const groups = [];
  let lastRole = '';
  for (const msg of buf) {
    if (msg.role !== lastRole) {
      groups.push({ role: msg.role, entries: [msg] });
      lastRole = msg.role;
    } else {
      groups[groups.length - 1].entries.push(msg);
    }
  }

  let html = '';
  let lastDate = '';
  for (const group of groups) {
    const date = formatDate(group.entries[0].ts);
    if (date !== lastDate) {
      html += `<div class="date-sep"><span>${date}</span></div>`;
      lastDate = date;
    }

    const isRight = group.role === 'user';
    const color = group.role === 'user' ? '#e8b86d' : agentColor(key === SYS_KEY ? 'oracle' : key);
    const name = group.role === 'user' ? 'You' : displayName(key === SYS_KEY ? 'Oracle' : key);
    const avatar = chibiAvatar(group.role === 'user' ? 'user' : (key === SYS_KEY ? 'oracle' : key));

    html += `<div class="msg-group ${isRight ? 'right' : ''}">`;
    html += avatar;
    html += `<div class="bubble-col">`;

    // Meta
    html += `<div class="msg-meta">
      <span class="msg-name" style="color:${color}">${escapeHtml(name)}</span>
      <span class="msg-tag ${group.role === 'user' ? 'human' : 'ai'}">${group.role === 'user' ? 'Human' : 'AI'}</span>
      <span class="msg-time">${formatTime(group.entries[0].ts)}</span>
      ${group.entries.length > 1 ? `<span class="msg-count-badge">×${group.entries.length}</span>` : ''}
    </div>`;

    // Bubbles
    group.entries.forEach((msg, i) => {
      const isFirst = i === 0;
      const isLast = i === group.entries.length - 1;
      const classes = ['bubble'];
      if (isFirst && group.entries.length > 1) classes.push('first');
      if (isLast && group.entries.length > 1) classes.push('last');
      if (msg.isCmd) classes.push('cmd');
      html += `<div class="${classes.join(' ')}">${escapeHtml(msg.text)}</div>`;
    });

    html += `</div></div>`;
  }
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

// ═══════════════════════════════════════════════════════════════
// Render — Timeline View
// ═══════════════════════════════════════════════════════════════
function renderTimeline() {
  const el = document.getElementById('messages');
  const key = selectedAgent || SYS_KEY;
  const msgs = allMessages.filter(m => key === SYS_KEY || m.agentId === key);
  if (msgs.length === 0) { renderWelcome(); return; }

  let html = '';
  let lastDate = '';
  let lastFrom = '';

  for (const msg of msgs) {
    const date = formatDate(msg.ts);
    if (date !== lastDate) {
      html += `<div class="date-sep"><span>${date}</span></div>`;
      lastDate = date;
      lastFrom = '';
    }

    const isRight = msg.from === 'user';
    const color = msg.from === 'user' ? '#e8b86d' : agentColor(msg.agentId);
    const name = msg.from === 'user' ? 'You' : displayName(msg.agentId);
    const showAvatar = msg.from !== lastFrom;

    if (showAvatar) {
      html += `<div class="msg-group ${isRight ? 'right' : ''}">`;
      html += chibiAvatar(msg.from === 'user' ? 'user' : msg.agentId);
      html += `<div class="bubble-col">`;
      html += `<div class="msg-meta">
        <span class="msg-name" style="color:${color}">${escapeHtml(name)}</span>
        <span class="msg-time">${formatTime(msg.ts)}</span>
      </div>`;
    }

    html += `<div class="bubble">${escapeHtml(msg.msg)}</div>`;

    if (showAvatar) { html += `</div></div>`; }
    lastFrom = msg.from;
  }

  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

// ═══════════════════════════════════════════════════════════════
// Render — Threads View
// ═══════════════════════════════════════════════════════════════
function renderThreads() {
  const el = document.getElementById('messages');
  const msgs = allMessages;
  if (msgs.length === 0) { renderWelcome(); return; }

  // Group by agent pair
  const threads = new Map();
  for (const msg of msgs) {
    const from = msg.from === 'user' ? 'user' : msg.agentId;
    const to = msg.agentId;
    const key = pairKey(from, to);
    if (!threads.has(key)) threads.set(key, []);
    threads.get(key).push(msg);
  }

  let html = '';
  for (const [pair, entries] of threads) {
    const [a, b] = pair.split('↔');
    const last = entries[entries.length - 1];
    html += `<div class="thread-card">
      <div class="thread-header" onclick="this.parentElement.classList.toggle('collapsed')">
        <div style="display:flex;align-items:center;gap:-4px">
          ${chibiAvatar(a === 'user' ? 'user' : a, 28)}
          ${chibiAvatar(b === 'user' ? 'user' : b, 28)}
        </div>
        <div class="pair">
          <div class="pair-names">
            <span style="color:${agentColor(a)}">${displayName(a)}</span>
            <span style="color:var(--dim)"> & </span>
            <span style="color:${agentColor(b)}">${displayName(b)}</span>
            <span style="color:var(--dim);font-size:10px;margin-left:4px">${entries.length}</span>
          </div>
          <div class="pair-preview">${displayName(last.from)}: ${(last.msg || '').slice(0, 60)}</div>
        </div>
      </div>
      <div class="thread-body">
        ${entries.slice(-5).map(msg => {
          const isRight = msg.from === 'user';
          return `<div class="msg-group ${isRight ? 'right' : ''}" style="max-width:80%">
            ${chibiAvatar(msg.from === 'user' ? 'user' : msg.agentId)}
            <div class="bubble-col">
              <div class="msg-meta">
                <span class="msg-name" style="color:${agentColor(msg.from === 'user' ? 'user' : msg.agentId)}">${displayName(msg.from === 'user' ? 'user' : msg.agentId)}</span>
                <span class="msg-time">${formatTime(msg.ts)}</span>
              </div>
              <div class="bubble">${escapeHtml(msg.msg)}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  el.innerHTML = html;
}

function renderWelcome() {
  document.getElementById('messages').innerHTML = `
    <div class="welcome">
      <div style="font-size:64px;margin-bottom:12px">🧠</div>
      <h3>Oracle Multi-Agent Chat</h3>
      <p>เลือก agent จากแถบซ้าย แล้วเริ่มคุยได้เลย<br>
      หรือพิมพ์ <code>/wake ชื่อ role</code> เพื่อปลุก agent<br><br>
      💾 แชทถูกบันทึกแยกตาม agent — refresh ไม่หาย!</p>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
// Mode switch
// ═══════════════════════════════════════════════════════════════
function setMode(mode) {
  viewMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  renderMessages();
}

function renderMessages() {
  if (viewMode === 'timeline') renderTimeline();
  else if (viewMode === 'threads') renderThreads();
  else renderBubble();
}

// ═══════════════════════════════════════════════════════════════
// Agents
// ═══════════════════════════════════════════════════════════════
async function loadAgents() {
  try {
    const res = await fetch(`${API}/api/v2/agents`);
    const data = await res.json();
    agents = (data.agents || []).filter(a => a.role !== 'human' && a.role !== 'system');
    document.getElementById('agent-count').textContent = agents.length;

    const el = document.getElementById('agent-list');
    el.innerHTML = agents.map(a => {
      const buf = getBuffer(a.id);
      return `<div class="agent-card ${selectedAgent === a.id ? 'active' : ''}" onclick="selectAgent('${a.id}')">
        ${chibiAvatar(a.id, 32)}
        <div style="flex:1;min-width:0">
          <div class="name" style="color:${agentColor(a.id)}">${escapeHtml(a.name)}</div>
          <div class="role">${a.role}</div>
        </div>
        <span class="dot ${a.running ? 'active' : 'idle'}"></span>
        ${buf.length > 0 ? `<span class="msg-count">${buf.length}</span>` : ''}
      </div>`;
    }).join('') || '<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">ยังไม่มี agent<br>กด "สร้าง Agent" ด้านล่าง</div>';
  } catch {}
}

async function selectAgent(id) {
  selectedAgent = id;
  const agent = agents.find(a => a.id === id);
  document.getElementById('chat-title').textContent = `💬 ${agent?.name || id}`;
  document.getElementById('chat-info').textContent = agent?.role || '';
  await loadChatHistory(id);
  renderMessages();
  loadAgents();
}

async function spawnAgent() {
  const name = document.getElementById('spawn-name').value || `Agent${Date.now().toString(36)}`;
  const role = document.getElementById('spawn-role').value;
  try {
    const res = await fetch(`${API}/api/v2/agents/spawn`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, role }),
    });
    const data = await res.json();
    pushMsg(SYS_KEY, 'system', `⚡ สร้างแล้ว: ${data.name} (${data.role})`);
    document.getElementById('spawn-name').value = '';
    renderMessages();
    setTimeout(() => { loadAgents(); selectAgent(data.id); }, 1000);
  } catch (e) { pushMsg(SYS_KEY, 'system', `❌ ${e.message}`); renderMessages(); }
}

// ═══════════════════════════════════════════════════════════════
// Chat Send
// ═══════════════════════════════════════════════════════════════
async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  const key = selectedAgent || SYS_KEY;
  pushMsg(key, 'user', text);
  renderMessages();

  if (text.startsWith('/')) {
    try {
      const res = await fetch(`${API}/api/commands/execute`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ input: text }),
      });
      const data = await res.json();
      pushMsg(key, 'oracle', data.message || 'ไม่มีผลลัพธ์', true);
    } catch (e) { pushMsg(key, 'oracle', '❌ ' + e.message); }
    renderMessages();
    return;
  }

  if (selectedAgent) {
    try {
      const res = await fetch(`${API}/api/v2/agents/${selectedAgent}/chat`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      if (!res.ok) {
        pushMsg(key, 'oracle', `⚠️ ${data.error || 'Error'}\n\n💡 Agent อาจหยุดทำงานแล้ว`);
        loadAgents();
      } else {
        pushMsg(key, data.agent || 'agent', data.response || data.message || '...');
      }
    } catch (e) { pushMsg(key, 'oracle', '❌ ' + e.message); }
    renderMessages();
    return;
  }

  pushMsg(SYS_KEY, 'oracle', 'เลือก agent จากแถบซ้าย หรือพิมพ์ /wake <ชื่อ> <role>');
  renderMessages();
}

// ═══════════════════════════════════════════════════════════════
// WebSocket
// ═══════════════════════════════════════════════════════════════
function connectWS() {
  const ws = new WebSocket(`${wsProto}//${location.host}/ws`);
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'agent_spawned' || msg.type === 'agent_died') loadAgents();
      if (msg.type === 'reply') {
        const key = selectedAgent || SYS_KEY;
        pushMsg(key, msg.role || 'oracle', msg.message, msg.cmd);
        renderMessages();
      }
    } catch {}
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
  setInterval(() => { if (ws.readyState === 1) ws.send('{"type":"ping"}'); }, 30000);
}

// ═══════════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════════
connectWS();
loadAgents();
renderMessages();
setInterval(loadAgents, 10000);
</script>

</html>
