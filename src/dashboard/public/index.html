<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 ARRA Office — Oracle Multi-Agent</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a2e;--bg4:#252540;
  --text:#e0e0e8;--text2:#9090a8;--text3:#606078;
  --accent:#7c3aed;--accent2:#a78bfa;--accent3:#c4b5fd;
  --green:#10b981;--green2:#34d399;
  --red:#ef4444;--red2:#f87171;
  --yellow:#f59e0b;--yellow2:#fbbf24;
  --blue:#3b82f6;--blue2:#60a5fa;
  --cyan:#06b6d4;--pink:#ec4899;
  --border:#2a2a3e;--shadow:0 4px 24px rgba(0,0,0,.4);
  --radius:10px;--radius-sm:6px;
}
html,body{height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text)}
#root{height:100%}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);text-align:center}
.sidebar-header h1{font-size:14px;color:var(--accent2);letter-spacing:1px}
.sidebar-header .version{font-size:10px;color:var(--text3);margin-top:2px}
.nav{flex:1;overflow-y:auto;padding:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent);color:#fff;font-weight:500}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.nav-item .badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px}
.nav-item.active .badge{background:rgba(255,255,255,.25)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:48px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0}
.topbar .page-title{font-size:15px;font-weight:600;color:var(--text)}
.topbar .status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.topbar .spacer{flex:1}
.topbar .info{font-size:11px;color:var(--text3)}
.content{flex:1;overflow-y:auto;padding:20px}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:14px;font-weight:600;color:var(--text)}
.card-subtitle{font-size:11px;color:var(--text3)}

/* Grid */
.grid{display:grid;gap:12px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.grid-4{grid-template-columns:1fr 1fr 1fr 1fr}
@media(max-width:900px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}

/* Stat cards */
.stat{background:var(--bg3);border-radius:var(--radius-sm);padding:14px;text-align:center}
.stat .value{font-size:28px;font-weight:700;color:var(--accent2)}
.stat .label{font-size:11px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.stat.green .value{color:var(--green2)}
.stat.blue .value{color:var(--blue2)}
.stat.yellow .value{color:var(--yellow2)}
.stat.red .value{color:var(--red2)}

/* Agent cards */
.agent-card{background:var(--bg3);border-radius:var(--radius-sm);padding:12px;display:flex;align-items:center;gap:12px;transition:all .15s}
.agent-card:hover{background:var(--bg4)}
.agent-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.agent-avatar.manager{background:linear-gradient(135deg,#7c3aed,#a78bfa)}
.agent-avatar.coder{background:linear-gradient(135deg,#3b82f6,#60a5fa)}
.agent-avatar.researcher{background:linear-gradient(135deg,#06b6d4,#22d3ee)}
.agent-avatar.writer{background:linear-gradient(135deg,#f59e0b,#fbbf24)}
.agent-avatar.general{background:linear-gradient(135deg,#10b981,#34d399)}
.agent-info{flex:1;min-width:0}
.agent-name{font-size:13px;font-weight:600}
.agent-role{font-size:11px;color:var(--text3)}
.agent-status{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
.agent-status.active{background:rgba(16,185,129,.15);color:var(--green2)}
.agent-status.idle{background:rgba(245,158,11,.15);color:var(--yellow2)}
.agent-status.working{background:rgba(59,130,246,.15);color:var(--blue2)}
.agent-status.stopped{background:rgba(239,68,68,.15);color:var(--red2)}

/* Feed */
.feed-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.feed-item:last-child{border-bottom:none}
.feed-time{color:var(--text3);font-size:10px;white-space:nowrap;min-width:60px}
.feed-type{padding:1px 6px;border-radius:4px;font-size:10px;font-weight:500;white-space:nowrap}
.feed-type.agent_register{background:rgba(16,185,129,.15);color:var(--green2)}
.feed-type.agent_status{background:rgba(59,130,246,.15);color:var(--blue2)}
.feed-type.agent_message{background:rgba(124,58,237,.15);color:var(--accent2)}
.feed-type.session_create{background:rgba(6,182,212,.15);color:var(--cyan)}
.feed-type.team_create{background:rgba(236,72,153,.15);color:var(--pink)}
.feed-type.hub_start{background:rgba(245,158,11,.15);color:var(--yellow2)}
.feed-type.broadcast{background:rgba(239,68,68,.15);color:var(--red2)}
.feed-type.vault_write{background:rgba(34,197,94,.15);color:var(--green2)}
.feed-type.federation_peer_add{background:rgba(96,165,250,.15);color:var(--blue2)}
.feed-text{color:var(--text2);flex:1}

/* Chat */
.chat-container{display:flex;flex-direction:column;height:100%}
.chat-sidebar{width:200px;border-right:1px solid var(--border);padding:8px;flex-shrink:0}
.chat-agent{padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px;color:var(--text2)}
.chat-agent:hover{background:var(--bg3)}
.chat-agent.active{background:var(--accent);color:#fff}
.chat-messages{flex:1;overflow-y:auto;padding:12px}
.chat-bubble{max-width:70%;padding:10px 14px;border-radius:12px;margin-bottom:8px;font-size:13px;line-height:1.5}
.chat-bubble.user{background:var(--accent);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.chat-bubble.agent{background:var(--bg3);border-bottom-left-radius:4px}
.chat-bubble .sender{font-size:10px;font-weight:600;margin-bottom:4px;opacity:.7}
.chat-input-area{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-size:13px;outline:none;resize:none;font-family:inherit}
.chat-input:focus{border-color:var(--accent)}
.btn{padding:8px 16px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}

/* Tasks (Kanban) */
.kanban{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;height:100%}
.kanban-col{background:var(--bg3);border-radius:var(--radius);padding:12px;display:flex;flex-direction:column}
.kanban-header{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.kanban-header .count{background:var(--bg4);padding:1px 8px;border-radius:10px;font-size:10px}
.kanban-items{flex:1;overflow-y:auto}
.kanban-item{background:var(--bg2);border-radius:var(--radius-sm);padding:10px;margin-bottom:8px;font-size:12px;cursor:pointer;border-left:3px solid transparent}
.kanban-item:hover{border-left-color:var(--accent)}
.kanban-item.pending{border-left-color:var(--yellow)}
.kanban-item.active{border-left-color:var(--blue)}
.kanban-item.done{border-left-color:var(--green);opacity:.6}

/* Memory search */
.search-box{display:flex;gap:8px;margin-bottom:16px}
.search-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-size:13px;outline:none}
.search-input:focus{border-color:var(--accent)}
.memory-item{background:var(--bg3);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px}
.memory-item .category{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--bg4);color:var(--text3)}
.memory-item .content{font-size:13px;margin-top:6px;color:var(--text2)}
.memory-item .meta{font-size:10px;color:var(--text3);margin-top:6px}

/* Fleet */
.peer-card{background:var(--bg3);border-radius:var(--radius-sm);padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.peer-status{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.peer-status.online{background:var(--green)}
.peer-status.offline{background:var(--red)}
.peer-status.unknown{background:var(--text3)}

/* Vault */
.vault-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.vault-section{background:var(--bg3);border-radius:var(--radius-sm);padding:14px;text-align:center;cursor:pointer;transition:all .15s}
.vault-section:hover{background:var(--bg4);transform:translateY(-2px)}
.vault-section .icon{font-size:24px;margin-bottom:6px}
.vault-section .name{font-size:12px;font-weight:600}
.vault-section .count{font-size:10px;color:var(--text3);margin-top:2px}

/* Terminal-like */
.terminal{background:#0d0d0d;border-radius:var(--radius);padding:16px;font-family:'Cascadia Code','Fira Code',monospace;font-size:12px;line-height:1.6;color:var(--green2);overflow-y:auto;max-height:400px}
.terminal .prompt{color:var(--accent2)}
.terminal .error{color:var(--red2)}
.terminal .info{color:var(--blue2)}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:8px}
.tab{padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;color:var(--text2);transition:all .15s}
.tab:hover{color:var(--text);background:var(--bg3)}
.tab.active{color:var(--accent2);background:rgba(124,58,237,.1)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
.modal h2{font-size:16px;margin-bottom:16px}
.modal input,.modal textarea,.modal select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;color:var(--text);font-size:13px;margin-bottom:12px;outline:none;font-family:inherit}
.modal input:focus,.modal textarea:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .3s ease}

/* Responsive */
@media(max-width:768px){
  .sidebar{width:60px}
  .sidebar .nav-item span:not(.icon){display:none}
  .sidebar-header h1{font-size:10px}
  .sidebar-header .version{display:none}
  .kanban{grid-template-columns:1fr}
  .chat-sidebar{width:60px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ═══════════════════════════════════════════
// API Helper
// ═══════════════════════════════════════════
const API = window.location.origin;
async function api(path, method='GET', body=null) {
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch(`${API}${path}`, opts);
  return res.json();
}

// ═══════════════════════════════════════════
// WebSocket Hook
// ═══════════════════════════════════════════
function useWebSocket(onMessage) {
  const wsRef = useRef(null);
  const reconnectRef = useRef(true);

  useEffect(() => {
    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${proto}//${location.host}`);
      wsRef.current = ws;

      ws.onmessage = (e) => {
        try { onMessage(JSON.parse(e.data)); } catch {}
      };
      ws.onclose = () => {
        if(reconnectRef.current) setTimeout(connect, 3000);
      };
      ws.onerror = () => ws.close();
    }
    connect();
    return () => { reconnectRef.current = false; wsRef.current?.close(); };
  }, []);
}

// ═══════════════════════════════════════════
// App Component
// ═══════════════════════════════════════════
function App() {
  const [page, setPage] = useState('office');
  const [stats, setStats] = useState({});
  const [agents, setAgents] = useState([]);
  const [feed, setFeed] = useState([]);
  const [wsConnected, setWsConnected] = useState(false);

  // WebSocket messages
  useWebSocket(useCallback((msg) => {
    setWsConnected(true);
    if(msg.type === 'init') {
      setStats(msg.stats || {});
      setAgents(msg.agents || []);
      setFeed(prev => [...(msg.feed || []), ...prev].slice(0, 200));
    }
    if(msg.type === 'feed_event') {
      setFeed(prev => [msg.event, ...prev].slice(0, 200));
    }
    if(msg.type === 'agent_spawned') {
      setAgents(prev => [...prev.filter(a => a.id !== msg.agent.id), msg.agent]);
    }
    if(msg.type === 'agent_died') {
      setAgents(prev => prev.filter(a => a.id !== msg.agentId));
    }
    if(msg.type === 'stats') setStats(msg.stats);
  }, []));

  // Poll stats every 15s
  useEffect(() => {
    const iv = setInterval(async () => {
      try {
        const [s, a] = await Promise.all([api('/api/stats'), api('/api/agents')]);
        setStats(s);
        setAgents(a);
      } catch {}
    }, 15000);
    return () => clearInterval(iv);
  }, []);

  const navItems = [
    {id:'office', icon:'🏢', label:'Office'},
    {id:'chat', icon:'💬', label:'Chat'},
    {id:'dashboard', icon:'📊', label:'Dashboard'},
    {id:'tasks', icon:'📋', label:'Tasks'},
    {id:'memory', icon:'🧠', label:'Memory'},
    {id:'traces', icon:'🔍', label:'Traces'},
    {id:'feed', icon:'📡', label:'Feed', badge: feed.length},
    {id:'vault', icon:'🔐', label:'Vault'},
    {id:'fleet', icon:'🌐', label:'Fleet'},
    {id:'inbox', icon:'📥', label:'Inbox'},
    {id:'terminal', icon:'⌨️', label:'Terminal'},
    {id:'config', icon:'⚙️', label:'Config'},
  ];

  const renderPage = () => {
    switch(page) {
      case 'office': return <OfficePage agents={agents} stats={stats} feed={feed} />;
      case 'chat': return <ChatPage agents={agents} />;
      case 'dashboard': return <DashboardPage stats={stats} agents={agents} feed={feed} />;
      case 'tasks': return <TasksPage />;
      case 'memory': return <MemoryPage />;
      case 'traces': return <TracesPage />;
      case 'feed': return <FeedPage feed={feed} />;
      case 'vault': return <VaultPage />;
      case 'fleet': return <FleetPage />;
      case 'inbox': return <InboxPage />;
      case 'terminal': return <TerminalPage />;
      case 'config': return <ConfigPage />;
      default: return <OfficePage agents={agents} stats={stats} feed={feed} />;
    }
  };

  return (
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-header">
          <h1>🧠 ARRA OFFICE</h1>
          <div className="version">v4.0 — Oracle</div>
        </div>
        <div className="nav">
          {navItems.map(item => (
            <div key={item.id}
              className={`nav-item ${page===item.id?'active':''}`}
              onClick={() => setPage(item.id)}>
              <span className="icon">{item.icon}</span>
              <span>{item.label}</span>
              {item.badge ? <span className="badge">{item.badge > 99 ? '99+' : item.badge}</span> : null}
            </div>
          ))}
        </div>
      </div>
      <div className="main">
        <div className="topbar">
          <div className="status-dot" style={{background: wsConnected ? 'var(--green)' : 'var(--red)'}}></div>
          <div className="page-title">{navItems.find(n=>n.id===page)?.label}</div>
          <div className="spacer"></div>
          <div className="info">
            🤖 {stats.activeAgents||0}/{stats.agents||0} agents · 💾 {stats.memories||0} memories
          </div>
        </div>
        <div className="content">{renderPage()}</div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// OFFICE PAGE — Agent Grid (ARRA Office style)
// ═══════════════════════════════════════════
function OfficePage({ agents, stats, feed }) {
  const roleIcons = { manager:'👔', coder:'💻', researcher:'🔬', writer:'✍️', general:'🤖', 'data-analyst':'📊', devops:'🔧', 'qa-tester':'🧪', translator:'🌐' };
  const [showSpawn, setShowSpawn] = useState(false);
  const [spawnForm, setSpawnForm] = useState({ name:'', role:'general', personality:'' });

  async function spawnAgent() {
    if(!spawnForm.name) return;
    await api('/api/agents', 'POST', spawnForm);
    setShowSpawn(false);
    setSpawnForm({ name:'', role:'general', personality:'' });
  }

  async function stopAgent(id, name) {
    if(confirm(`Stop ${name}?`)) {
      await api(`/api/agents/${id}`, 'DELETE');
    }
  }

  return (
    <div className="fade-in">
      <div className="card">
        <div className="card-header">
          <div>
            <div className="card-title">🏢 ARRA Office — Agent Grid</div>
            <div className="card-subtitle">Spawn, monitor, and manage your AI agents</div>
          </div>
          <button className="btn btn-primary" onClick={() => setShowSpawn(true)}>+ Spawn Agent</button>
        </div>

        <div className="grid grid-4" style={{marginBottom:16}}>
          <div className="stat green"><div className="value">{stats.activeAgents||0}</div><div className="label">Active</div></div>
          <div className="stat blue"><div className="value">{stats.agents||0}</div><div className="label">Total</div></div>
          <div className="stat yellow"><div className="value">{stats.memories||0}</div><div className="label">Memories</div></div>
          <div className="stat"><div className="value">{stats.messages||0}</div><div className="label">Messages</div></div>
        </div>

        {agents.length === 0 ? (
          <div style={{textAlign:'center',padding:'40px',color:'var(--text3)'}}>
            <div style={{fontSize:48,marginBottom:12}}>🤖</div>
            <div>No agents running. Click "+ Spawn Agent" to start.</div>
          </div>
        ) : (
          <div className="grid grid-2">
            {agents.map(a => (
              <div key={a.id} className="agent-card">
                <div className={`agent-avatar ${a.role}`}>{roleIcons[a.role]||'🤖'}</div>
                <div className="agent-info">
                  <div className="agent-name">{a.name}</div>
                  <div className="agent-role">{a.role}</div>
                </div>
                <span className={`agent-status ${a.status}`}>{a.status}</span>
                <button className="btn btn-sm btn-ghost" onClick={() => stopAgent(a.id, a.name)}>✕</button>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Recent Feed */}
      <div className="card">
        <div className="card-header">
          <div className="card-title">📡 Recent Activity</div>
          <div className="card-subtitle">{feed.length} events</div>
        </div>
        <div style={{maxHeight:300,overflowY:'auto'}}>
          {feed.slice(0,20).map((e,i) => (
            <div key={e.id || i} className="feed-item">
              <div className="feed-time">{new Date(e.timestamp).toLocaleTimeString()}</div>
              <span className={`feed-type ${e.type}`}>{e.type}</span>
              <div className="feed-text">{e.agent || e.peer || e.section || e.message?.slice(0,60) || ''}</div>
            </div>
          ))}
          {feed.length === 0 && <div style={{color:'var(--text3)',textAlign:'center',padding:20}}>No activity yet</div>}
        </div>
      </div>

      {/* Spawn Modal */}
      {showSpawn && (
        <div className="modal-overlay" onClick={() => setShowSpawn(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h2>🤖 Spawn New Agent</h2>
            <input placeholder="Agent name" value={spawnForm.name}
              onChange={e => setSpawnForm({...spawnForm, name:e.target.value})} />
            <select value={spawnForm.role} onChange={e => setSpawnForm({...spawnForm, role:e.target.value})}>

// CHAT PAGE
// ═══════════════════════════════════════════
function ChatPage({ agents }) {
  const [selectedAgent, setSelectedAgent] = useState(null);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const messagesEnd = useRef(null);

  useEffect(() => {
    messagesEnd.current?.scrollIntoView({ behavior:'smooth' });
  }, [messages]);

  async function sendMessage() {
    if(!input.trim() || !selectedAgent) return;
    const msg = input.trim();
    setInput('');
    setMessages(prev => [...prev, { role:'user', content:msg, time: new Date() }]);
    setLoading(true);
    try {
      const data = await api(`/api/agents/${selectedAgent.id}/chat`, 'POST', { message: msg });
      setMessages(prev => [...prev, { role:'agent', content: data.response, agent: selectedAgent.name, time: new Date() }]);
    } catch(err) {
      setMessages(prev => [...prev, { role:'agent', content: `Error: ${err.message}`, agent: 'System', time: new Date() }]);
    }
    setLoading(false);
  }

  return (
    <div className="fade-in" style={{display:'flex',height:'calc(100vh - 120px)'}}>
      {/* Agent sidebar */}
      <div className="chat-sidebar">
        <div style={{fontSize:11,color:'var(--text3)',marginBottom:8,padding:'0 8px'}}>AGENTS</div>
        {agents.length === 0 && <div style={{fontSize:11,color:'var(--text3)',padding:8}}>No agents</div>}
        {agents.map(a => (
          <div key={a.id}
            className={`chat-agent ${selectedAgent?.id===a.id?'active':''}`}
            onClick={() => setSelectedAgent(a)}>
            <span>🤖</span>
            <span>{a.name}</span>
          </div>
        ))}
      </div>

      {/* Chat area */}
      <div style={{flex:1,display:'flex',flexDirection:'column'}}>
        {!selectedAgent ? (
          <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text3)'}}>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:48,marginBottom:12}}>💬</div>
              <div>Select an agent to start chatting</div>
            </div>
          </div>
        ) : (
          <>
            <div className="chat-messages">
              {messages.map((m,i) => (
                <div key={i} className={`chat-bubble ${m.role}`}>
                  {m.role === 'agent' && <div className="sender">{m.agent}</div>}
                  {m.content}
                </div>
              ))}
              {loading && (
                <div className="chat-bubble agent">
                  <div className="sender">{selectedAgent.name}</div>
                  <span style={{opacity:.5}}>Thinking...</span>
                </div>
              )}
              <div ref={messagesEnd} />
            </div>
            <div className="chat-input-area">
              <textarea className="chat-input" rows={1} placeholder="Type a message..."
                value={input} onChange={e => setInput(e.target.value)}
                onKeyDown={e => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }}} />
              <button className="btn btn-primary" onClick={sendMessage} disabled={loading}>Send</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// TASKS PAGE — Kanban Board
// ═══════════════════════════════════════════
function TasksPage() {
  const [tasks, setTasks] = useState([]);
  const [newTask, setNewTask] = useState('');

  useEffect(() => { loadTasks(); }, []);

  async function loadTasks() {
    try {
      const data = await api('/api/tasks');
      setTasks(data.tasks || []);
    } catch {}
  }

  async function addTask() {
    if(!newTask.trim()) return;
    await api('/api/tasks', 'POST', { description: newTask });
    setNewTask('');
    loadTasks();
  }

  async function updateTask(id, status) {
    await api(`/api/tasks/${id}`, 'PUT', { status });
    loadTasks();
  }

  const pending = tasks.filter(t => t.status === 'pending');
  const active = tasks.filter(t => t.status === 'active');
  const done = tasks.filter(t => t.status === 'done');

  return (
    <div className="fade-in" style={{height:'calc(100vh - 120px)',display:'flex',flexDirection:'column'}}>
      <div className="search-box">
        <input className="search-input" placeholder="New task description..."
          value={newTask} onChange={e => setNewTask(e.target.value)}
          onKeyDown={e => e.key==='Enter' && addTask()} />
        <button className="btn btn-primary" onClick={addTask}>+ Add</button>
      </div>

      <div className="kanban" style={{flex:1}}>
        <div className="kanban-col">
          <div className="kanban-header">⏳ Pending <span className="count">{pending.length}</span></div>
          <div className="kanban-items">
            {pending.map(t => (
              <div key={t.id} className="kanban-item pending" onClick={() => updateTask(t.id, 'active')}>
                {t.description}
              </div>
            ))}
          </div>
        </div>
        <div className="kanban-col">
          <div className="kanban-header">🔄 Active <span className="count">{active.length}</span></div>
          <div className="kanban-items">
            {active.map(t => (
              <div key={t.id} className="kanban-item active" onClick={() => updateTask(t.id, 'done')}>
                {t.description}
              </div>
            ))}
          </div>
        </div>
        <div className="kanban-col">
          <div className="kanban-header">✅ Done <span className="count">{done.length}</span></div>
          <div className="kanban-items">
            {done.map(t => (
              <div key={t.id} className="kanban-item done">
                {t.description}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function MemoryPage() {

  useEffect(() => { search(); }, []);

  return (

// TERMINAL PAGE
// ═══════════════════════════════════════════
function TerminalPage() {
  const [lines, setLines] = useState([
    { type:'info', text:'🧠 ARRA Office Terminal v4.0' },
    { type:'info', text:'Type "help" for available commands.' },
    { type:'', text:'' },
  ]);
  const [input, setInput] = useState('');
  const termEnd = useRef(null);

  useEffect(() => { termEnd.current?.scrollIntoView(); }, [lines]);

  async function exec() {
    const cmd = input.trim();
    if(!cmd) return;
    setInput('');
    setLines(prev => [...prev, { type:'prompt', text:`oracle> ${cmd}` }]);

    if(cmd === 'help') {
      setLines(prev => [...prev,
        { type:'info', text:'Available: status, agents, tasks, feed, vault, fleet, costs, recap, clear' },
        { type:'', text:'' }
      ]);
      return;
    }
    if(cmd === 'clear') { setLines([]); return; }

    try {
      const endpoints = {
        status: '/api/stats',
        agents: '/api/agents',
        tasks: '/api/tasks',
        feed: '/api/feed?limit=10',
        vault: '/api/vault/status',
        fleet: '/api/federation/peers',
        costs: '/api/costs',
      };
      if(endpoints[cmd]) {
        const data = await api(endpoints[cmd]);
        setLines(prev => [...prev,
          { type:'', text: JSON.stringify(data, null, 2) },
          { type:'', text:'' }
        ]);
      } else if(cmd === 'recap') {
        const data = await api('/api/slash', 'POST', { command: '/recap' });
        setLines(prev => [...prev, { type:'', text: data.response }, { type:'', text:'' }]);
      } else {
        setLines(prev => [...prev, { type:'error', text:`Unknown: ${cmd}` }, { type:'', text:'' }]);
      }
    } catch(err) {
      setLines(prev => [...prev, { type:'error', text: err.message }, { type:'', text:'' }]);
    }
  }

  return (
    <div className="fade-in">
      <div className="terminal">
        {lines.map((l,i) => (
          <div key={i} className={l.type}>{l.text}</div>
        ))}
        <div style={{display:'flex',alignItems:'center'}}>
          <span className="prompt">oracle&gt; </span>
          <input
            style={{background:'transparent',border:'none',color:'var(--green2)',outline:'none',flex:1,fontFamily:'inherit',fontSize:12}}
            value={input} onChange={e => setInput(e.target.value)}
            onKeyDown={e => e.key==='Enter' && exec()}
            autoFocus
          />
        </div>
        <div ref={termEnd} />
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// CONFIG PAGE
// ═══════════════════════════════════════════
function ConfigPage() {
  const [health, setHealth] = useState({});
  const [plugins, setPlugins] = useState([]);

  useEffect(() => {
    api('/api/health').then(setHealth).catch(() => {});
    api('/api/plugins').then(d => setPlugins(d.plugins || [])).catch(() => {});
  }, []);

  return (
    <div className="fade-in">
      <div className="grid grid-2">
        <div className="card">
          <div className="card-title">⚙️ System Config</div>
          <div style={{marginTop:12}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,fontSize:13}}>
              <span>Status</span><span style={{color:'var(--green2)'}}>{health.status}</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,fontSize:13}}>
              <span>Version</span><span>{health.version}</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,fontSize:13}}>
              <span>Provider</span><span>{health.provider}</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,fontSize:13}}>
              <span>Node.js</span><span>{health.node_version || '—'}</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,fontSize:13}}>
              <span>Memory</span><span>{health.memory ? `${Math.round(health.memory.heapUsed/1024/1024)}MB` : '—'}</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:13}}>
              <span>Uptime</span><span>{Math.floor((health.uptime||0)/60)}m</span>
            </div>
          </div>
        </div>

        <div className="card">
          <div className="card-title">🔌 Plugins</div>
          <div style={{marginTop:12}}>
            {plugins.map((p,i) => (
              <div key={i} style={{display:'flex',justifyContent:'space-between',marginBottom:8,fontSize:13}}>
                <span>{p.name}</span>
                <span style={{color:'var(--text3)'}}>{p.hooks?.join(', ') || '—'}</span>
              </div>
            ))}
            {plugins.length === 0 && <div style={{color:'var(--text3)',fontSize:12}}>No plugins loaded</div>}
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-title">📚 API Endpoints</div>
        <div style={{marginTop:12,fontSize:12,fontFamily:'monospace',color:'var(--text2)'}}>
          <div>GET  /api/health — Health check</div>
          <div>GET  /api/stats — System statistics</div>
          <div>GET  /api/agents — List agents</div>
          <div>POST /api/agents — Spawn agent</div>
          <div>POST /api/agents/:id/chat — Chat</div>
          <div>POST /api/agents/:from/tell/:to — Agent-to-agent</div>
          <div>GET  /api/feed — Event feed</div>
          <div>GET  /api/tasks — Tasks</div>
          <div>GET  /api/memory/search?q= — Search</div>
          <div>GET  /api/traces — Traces</div>
          <div>GET  /api/vault/status — Vault</div>
          <div>GET  /api/federation/peers — Peers</div>
          <div>POST /api/peer/exec — Remote exec</div>
          <div>POST /api/broadcast — Broadcast to all</div>
          <div>GET  /api/costs — API costs</div>
          <div>GET  /api/plugins — Plugins list</div>
          <div>POST /api/slash — Slash commands</div>
        </div>
      </div>
    </div>
  );
}
