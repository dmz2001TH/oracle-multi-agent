<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARRA Office — Oracle Multi-Agent</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #020208;
      --surface: #0a0a12;
      --surface2: #10101a;
      --surface3: #18182a;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.12);
      --border-active: rgba(255,255,255,0.2);
      --text: rgba(255,255,255,0.9);
      --text-dim: rgba(255,255,255,0.45);
      --text-muted: rgba(255,255,255,0.2);
      --accent: #7c3aed;
      --accent-glow: rgba(124,58,237,0.25);
      --green: #4caf50;
      --green-glow: rgba(76,175,80,0.25);
      --yellow: #fdd835;
      --yellow-glow: rgba(253,216,53,0.25);
      --red: #ef5350;
      --red-glow: rgba(239,83,80,0.25);
      --blue: #42a5f5;
      --orange: #fdd835;
      --cyan: #26c6da;
      --pink: #ec407a;
      --human: #e8b86d;
    }
    body {
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ═══════════════════════════════════════════
       STATUS BAR (matches AppShell)
    ═══════════════════════════════════════════ */
    .statusbar {
      height: 44px;
      background: rgba(10,10,18,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      flex-shrink: 0;
      z-index: 100;
      -webkit-app-region: drag;
    }
    .statusbar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--text);
      margin-right: 12px;
    }
    .statusbar-brand .logo { font-size: 18px; }
    .statusbar-nav {
      display: flex;
      gap: 2px;
      flex: 1;
      -webkit-app-region: no-drag;
    }
    .nav-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .nav-btn.active {
      background: rgba(124,58,237,0.15);
      color: #a78bfa;
    }
    .nav-btn .nav-badge {
      background: var(--accent);
      color: #fff;
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 8px;
      min-width: 16px;
      text-align: center;
    }
    .statusbar-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 10px;
      color: var(--text-dim);
      -webkit-app-region: no-drag;
    }
    .ws-dot {
      width: 7px; height: 7px; border-radius: 50%;
      display: inline-block;
      transition: all 0.3s;
    }
    .ws-dot.green { background: var(--green); box-shadow: 0 0 8px var(--green-glow); }
    .ws-dot.red { background: var(--red); box-shadow: 0 0 8px var(--red-glow); }
    .ws-dot.yellow { background: var(--yellow); box-shadow: 0 0 8px var(--yellow-glow); }

    /* ═══════════════════════════════════════════
       LAYOUT
    ═══════════════════════════════════════════ */
    .main-area {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .view {
      display: none;
      height: 100%;
      overflow-y: auto;
    }
    .view.active { display: flex; flex-direction: column; }
    .view-scroll { flex: 1; overflow-y: auto; padding: 20px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

    /* ═══════════════════════════════════════════
       OFFICE VIEW (Agent Grid — like maw-ui office.html)
    ═══════════════════════════════════════════ */
    .office-header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .office-header h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .office-header .subtitle {
      font-size: 11px;
      color: var(--text-dim);
    }
    .office-header .spacer { flex: 1; }
    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      padding: 0 20px 20px;
    }
    .agent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .agent-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .agent-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .agent-card-avatar {
      width: 48px;
      height: 48px;
      position: relative;
      flex-shrink: 0;
    }
    .agent-card-avatar svg { width: 100%; height: 100%; }
    .agent-card-name {
      font-size: 14px;
      font-weight: 600;
      text-transform: capitalize;
    }
    .agent-card-role {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .agent-card-status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      margin-top: 4px;
    }
    .agent-card-status.ready { background: rgba(76,175,80,0.12); color: var(--green); }
    .agent-card-status.active { background: rgba(76,175,80,0.12); color: var(--green); }
    .agent-card-status.busy { background: rgba(253,216,53,0.12); color: var(--yellow); }
    .agent-card-status.thinking { background: rgba(124,58,237,0.12); color: #a78bfa; }
    .agent-card-status.working { background: rgba(253,216,53,0.12); color: var(--yellow); }
    .agent-card-status.stopped { background: rgba(239,83,80,0.12); color: var(--red); }
    .agent-card-status.idle { background: rgba(255,255,255,0.06); color: var(--text-dim); }
    .agent-card-preview {
      font-size: 10px;
      color: var(--text-muted);
      font-style: italic;
      margin-top: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .agent-card-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .agent-card:hover .agent-card-actions { opacity: 1; }
    .agent-card-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
      font-size: 12px;
    }
    .agent-card-empty .big-icon { font-size: 48px; margin-bottom: 12px; display: block; }
    .agent-card-empty .sub { color: var(--text-muted); font-size: 11px; margin-top: 6px; }

    /* ═══════════════════════════════════════════
       CHAT VIEW (matches ChatBubble.tsx / ChatView)
    ═══════════════════════════════════════════ */
    .chat-layout {
      display: flex;
      height: 100%;
      overflow: hidden;
    }
    .chat-sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .chat-sidebar-top {
      padding: 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chat-sidebar-top h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-dim);
    }
    .chat-agent-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
    }
    .chat-agent-entry {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.12s;
      margin-bottom: 2px;
    }
    .chat-agent-entry:hover { background: rgba(255,255,255,0.04); }
    .chat-agent-entry.selected { background: rgba(124,58,237,0.12); }
    .chat-agent-entry .entry-avatar {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }
    .chat-agent-entry .entry-avatar svg { width: 100%; height: 100%; }
    .chat-agent-entry .entry-info { flex: 1; min-width: 0; }
    .chat-agent-entry .entry-name {
      font-size: 12px;
      font-weight: 600;
      text-transform: capitalize;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-agent-entry .entry-role {
      font-size: 10px;
      color: var(--text-dim);
    }
    .chat-agent-entry .entry-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Chat main */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-main-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 12px;
      gap: 8px;
    }
    .chat-main-empty .big-icon { font-size: 42px; opacity: 0.5; }
    .chat-main-active {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-topbar {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .chat-topbar .avatar-mini { width: 28px; height: 28px; }
    .chat-topbar .avatar-mini svg { width: 100%; height: 100%; }
    .chat-topbar .name {
      font-size: 13px;
      font-weight: 700;
      text-transform: capitalize;
    }
    .chat-topbar .role-badge {
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 4px;
      background: rgba(124,58,237,0.12);
      color: #a78bfa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .chat-topbar .spacer { flex: 1; }

    /* Messages */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Message group */
    .msg-group {
      display: flex;
      gap: 10px;
      max-width: 82%;
      animation: msgSlide 0.2s ease-out;
    }
    @keyframes msgSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .msg-group.right { align-self: flex-end; flex-direction: row-reverse; }
    .msg-group.left { align-self: flex-start; }
    .msg-group.system { align-self: center; max-width: 90%; }

    .msg-avatar-col {
      width: 36px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 2px;
    }
    .msg-avatar-col svg { width: 36px; height: 36px; }

    .msg-body {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .msg-meta {
      display: flex;
      align-items: baseline;
      gap: 6px;
      font-size: 10px;
      padding: 0 4px;
    }
    .msg-meta.right { justify-content: flex-end; }
    .msg-meta .sender-name {
      font-weight: 600;
      font-size: 11px;
      text-transform: capitalize;
    }
    .msg-meta .tag {
      font-size: 8px;
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: 500;
    }
    .msg-meta .tag.human { background: rgba(232,184,109,0.12); color: var(--human); }
    .msg-meta .tag.ai { background: rgba(100,181,246,0.08); color: rgba(100,181,246,0.6); }
    .msg-meta .time { color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
    .msg-meta .count { color: var(--text-muted); font-size: 9px; }

    .msg-bubble {
      padding: 10px 14px;
      font-size: 13.5px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-wrap: break-word;
      transition: all 0.15s;
      cursor: pointer;
    }
    .msg-bubble:hover { filter: brightness(1.1); }

    .msg-group.left .msg-bubble {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px 18px 18px 18px;
      color: rgba(255,255,255,0.85);
    }
    .msg-group.right .msg-bubble {
      border-radius: 18px 4px 18px 18px;
      color: rgba(255,255,255,0.95);
    }
    .msg-group.system .msg-bubble {
      background: rgba(253,216,53,0.06);
      border: 1px solid rgba(253,216,53,0.12);
      border-radius: 8px;
      font-size: 11px;
      color: var(--yellow);
      text-align: center;
    }

    /* Date separator */
    .date-sep {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 12px 0;
    }
    .date-sep .line { flex: 1; height: 1px; background: var(--border); }
    .date-sep .label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

    /* Typing */
    .typing-row {
      display: none;
      align-self: flex-start;
      padding: 8px 14px;
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.06);
      gap: 4px;
      align-items: center;
    }
    .typing-row.visible { display: flex; }
    .typing-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--text-dim);
      animation: tBounce 1.4s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tBounce {
      0%,60%,100% { transform: translateY(0); opacity: 0.3; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* Chat input */
    .chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .chat-input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .chat-textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.4;
      transition: border-color 0.2s;
    }
    .chat-textarea:focus { border-color: var(--accent); }
    .chat-textarea::placeholder { color: var(--text-muted); }
    .chat-send {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      font-size: 16px;
    }
    .chat-send:hover { background: #6d28d9; transform: scale(1.05); }
    .chat-send:active { transform: scale(0.95); }
    .chat-send:disabled { opacity: 0.3; cursor: default; transform: none; }

    /* ═══════════════════════════════════════════
       DASHBOARD VIEW
    ═══════════════════════════════════════════ */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }
    .metric-card .num {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .metric-card .label {
      font-size: 9px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* ═══════════════════════════════════════════
       TABLE STYLES
    ═══════════════════════════════════════════ */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .data-table th {
      text-align: left;
      padding: 8px 12px;
      background: var(--surface);
      color: var(--text-dim);
      font-weight: 500;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }
    .data-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .data-table tr:hover td { background: rgba(124,58,237,0.03); }

    /* ═══════════════════════════════════════════
       KANBAN
    ═══════════════════════════════════════════ */
    .kanban-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .kanban-col {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
    }
    .kanban-col h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .kanban-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 6px;
    }
    .kanban-item .title { font-size: 12px; font-weight: 600; margin-bottom: 3px; }
    .kanban-item .desc { font-size: 10px; color: var(--text-dim); }

    /* ═══════════════════════════════════════════
       SEARCH BAR
    ═══════════════════════════════════════════ */
    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .search-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-row input:focus { border-color: var(--accent); }

    /* ═══════════════════════════════════════════
       BUTTONS
    ═══════════════════════════════════════════ */
    .btn {
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .btn:hover { border-color: var(--border-hover); background: var(--surface2); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { background: #6d28d9; }
    .btn-danger { background: rgba(239,83,80,0.1); border-color: rgba(239,83,80,0.2); color: var(--red); }
    .btn-danger:hover { background: rgba(239,83,80,0.2); }
    .btn-sm { padding: 4px 10px; font-size: 10px; }

    /* ═══════════════════════════════════════════
       MODAL
    ═══════════════════════════════════════════ */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-bg.visible { display: flex; }
    .modal-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      width: 90%;
      max-width: 440px;
      animation: modalPop 0.2s ease-out;
    }
    @keyframes modalPop { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .modal-box h2 { font-size: 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .modal-box label {
      display: block; font-size: 10px; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 4px; margin-top: 14px;
    }
    .modal-box input, .modal-box select, .modal-box textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .modal-box input:focus, .modal-box select:focus, .modal-box textarea:focus { border-color: var(--accent); }
    .modal-box .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    /* ═══════════════════════════════════════════
       EMPTY STATE
    ═══════════════════════════════════════════ */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
      font-size: 12px;
    }
    .empty-state .icon { font-size: 36px; margin-bottom: 10px; display: block; opacity: 0.6; }
    .empty-state .sub { color: var(--text-muted); font-size: 11px; margin-top: 6px; }

    /* ═══════════════════════════════════════════
       TIMELINE
    ═══════════════════════════════════════════ */
    .timeline-entry {
      display: flex;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      align-items: center;
    }
    .timeline-entry .t-time { color: var(--text-dim); min-width: 50px; font-size: 10px; }
    .timeline-entry .t-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .timeline-entry .t-text { flex: 1; }

    /* ═══════════════════════════════════════════
       CARDS
    ═══════════════════════════════════════════ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .card h4 { font-size: 13px; margin-bottom: 6px; }
    .card p { font-size: 11px; color: var(--text-dim); line-height: 1.5; }
    .card .meta { font-size: 10px; color: var(--text-muted); margin-top: 8px; display: flex; gap: 12px; }

    /* ═══════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════ */
    @media (max-width: 768px) {
      .chat-sidebar { width: 60px; }
      .chat-sidebar .entry-info, .chat-sidebar-top h3 { display: none; }
      .kanban-row { grid-template-columns: 1fr; }
      .metrics-grid { grid-template-columns: repeat(2, 1fr); }
      .agent-grid { grid-template-columns: 1fr; }
      .nav-btn span:not(.nav-badge) { display: none; }
    }
  </style>
</head>
<body>

<!-- ═══════ STATUS BAR (AppShell style) ═══════ -->
<div class="statusbar">
  <div class="statusbar-brand">
    <span class="logo">🧠</span>
    <span>ARRA Office</span>
  </div>
  <div class="statusbar-nav">
    <button class="nav-btn active" data-view="office"><span>🏢</span><span>Office</span></button>
    <button class="nav-btn" data-view="chat"><span>💬</span><span>Chat</span></button>
    <button class="nav-btn" data-view="dashboard"><span>📊</span><span>Dashboard</span></button>
    <button class="nav-btn" data-view="tasks"><span>📋</span><span>Tasks</span></button>
    <button class="nav-btn" data-view="memory"><span>🧠</span><span>Memory</span></button>
    <button class="nav-btn" data-view="traces"><span>🔍</span><span>Traces</span></button>
    <button class="nav-btn" data-view="handoffs"><span>🔀</span><span>Handoffs</span></button>
  </div>
  <div class="statusbar-meta">
    <span><span class="ws-dot" id="ws-dot"></span> <span id="ws-label">Connecting</span></span>
    <span>⏱ <span id="uptime">--</span></span>
    <span>v2.1</span>
  </div>
</div>

<!-- ═══════ MAIN AREA ═══════ -->
<div class="main-area">

  <!-- OFFICE VIEW -->
  <div class="view active" id="view-office">
    <div class="office-header">
      <h2>🏢 Agent Office</h2>
      <span class="subtitle" id="office-count">No agents running</span>
      <span class="spacer"></span>
      <button class="btn btn-primary" onclick="openModal()">+ Spawn Agent</button>
    </div>
    <div class="agent-grid" id="office-grid"></div>
  </div>

  <!-- CHAT VIEW -->
  <div class="view" id="view-chat">
    <div class="chat-layout">
      <div class="chat-sidebar">
        <div class="chat-sidebar-top">
          <h3>Agents</h3>
          <button class="btn btn-sm btn-primary" onclick="openModal()">+ New</button>
        </div>
        <div class="chat-agent-list" id="chat-agent-list"></div>
      </div>
      <div class="chat-main">
        <div class="chat-main-empty" id="chat-empty">
          <span class="big-icon">💬</span>
          <span>Select an agent to start chatting</span>
          <span class="sub">Or spawn a new agent from the Office view</span>
        </div>
        <div class="chat-main-active" id="chat-active">
          <div class="chat-topbar" id="chat-topbar"></div>
          <div class="chat-messages" id="chat-messages"></div>
          <div class="chat-input-area">
            <div class="chat-input-row">
              <textarea class="chat-textarea" id="chat-input" placeholder="Type a message..." rows="1"></textarea>
              <button class="chat-send" id="chat-send-btn" onclick="sendChat()">➤</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- DASHBOARD VIEW -->
  <div class="view" id="view-dashboard">
    <div class="view-scroll">
      <div class="metrics-grid" id="metrics-grid"></div>
      <h3 style="font-size:13px; margin-bottom:10px; color:var(--text-dim);">Recent Activity</h3>
      <div id="activity-timeline"></div>
    </div>
  </div>

  <!-- TASKS VIEW -->
  <div class="view" id="view-tasks">
    <div class="view-scroll">
      <div class="kanban-row" id="task-kanban"></div>
    </div>
  </div>

  <!-- MEMORY VIEW -->
  <div class="view" id="view-memory">
    <div class="view-scroll">
      <div class="search-row">
        <input type="text" id="mem-q" placeholder="Search memories (FTS5)...">
        <button class="btn" onclick="searchMem()">🔍 Search</button>
      </div>
      <div id="mem-list"></div>
    </div>
  </div>

  <!-- TRACES VIEW -->
  <div class="view" id="view-traces">
    <div class="view-scroll">
      <div id="traces-list"></div>
    </div>
  </div>

  <!-- HANDOFFS VIEW -->
  <div class="view" id="view-handoffs">
    <div class="view-scroll">
      <div style="margin-bottom:12px">
        <button class="btn btn-primary" onclick="createHandoff()">+ Create Handoff</button>
      </div>
      <div id="handoffs-list"></div>
    </div>
  </div>

</div>

<!-- ═══════ SPAWN MODAL ═══════ -->
<div class="modal-bg" id="spawn-modal">
  <div class="modal-box">
    <h2>🤖 Spawn New Agent</h2>
    <label>Name</label>
    <input type="text" id="m-name" placeholder="e.g. Neo, Atlas, Sage...">
    <label>Role</label>
    <select id="m-role">
      <option value="general">🤖 General</option>
      <option value="researcher">🔬 Researcher</option>
      <option value="coder">💻 Coder</option>
      <option value="writer">✍️ Writer</option>
      <option value="manager">👔 Manager</option>
    </select>
    <label>Personality (optional)</label>
    <textarea id="m-personality" placeholder="Curious, clean code, asks why before how" rows="2"></textarea>
    <div class="actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="m-btn" onclick="spawnAgent()">🚀 Spawn</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let ws, agents = [], selectedAgent = null;
const chatHistories = {};

// ═══════════════════════════════════════════════════════
// CHIBI AVATAR SVG GENERATOR (matches ChibiAvatar.tsx)
// ═══════════════════════════════════════════════════════
const AGENT_COLORS = ['#ff6b6b','#4ecdc4','#45b7d1','#96ceb4','#ffa07a','#dda0dd','#98d8c8','#f7dc6f','#bb8fce','#85c1e9','#f0b27a','#82e0aa'];
const ROLE_ICONS = { general:'🤖', researcher:'🔬', coder:'💻', writer:'✍️', manager:'👔', system:'⚙️' };

function nameHash(s) { let h=0; for(let i=0;i<s.length;i++) h=((h<<5)-h+s.charCodeAt(i))|0; return Math.abs(h); }
function agentColor(name) { return AGENT_COLORS[nameHash(name) % AGENT_COLORS.length]; }

function chibiSVG(name, size=48) {
  const color = agentColor(name);
  const h = nameHash(name);
  const isHuman = name === 'human' || name === 'You';
  const hasEars = h % 3 === 0;
  const hasAntenna = !hasEars && h % 3 === 1;
  const eyeStyle = (h >> 4) % 3;

  let svg = `<svg width="${size}" height="${size}" viewBox="-25 -35 50 50" xmlns="http://www.w3.org/2000/svg">`;

  if (isHuman) {
    svg += `
      <circle cx="0" cy="-10" r="20" fill="#e8b86d" stroke="#fff" stroke-width="1.5"/>
      <ellipse cx="0" cy="-24" rx="16" ry="8" fill="#2c1b0e"/>
      <circle cx="-7" cy="-12" r="3.5" fill="#fff"/><circle cx="7" cy="-12" r="3.5" fill="#fff"/>
      <circle cx="-6" cy="-12" r="2" fill="#1a1a1a"/><circle cx="8" cy="-12" r="2" fill="#1a1a1a"/>
      <circle cx="-5" cy="-13" r=".8" fill="#fff"/><circle cx="9" cy="-13" r=".8" fill="#fff"/>
      <path d="M-4-4 Q0-1 4-4" fill="none" stroke="#333" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="-1" y1="-12" x2="1" y2="-12" stroke="#555" stroke-width="1"/>`;
  } else {
    // Head
    svg += `<circle cx="0" cy="-10" r="20" fill="${color}" stroke="#fff" stroke-width="1.5"/>`;
    // Hair tuft
    svg += `<ellipse cx="-4" cy="-28" rx="6" ry="4" fill="${color}" stroke="#fff" stroke-width=".8"/>`;
    svg += `<ellipse cx="4" cy="-29" rx="5" ry="3" fill="${color}" stroke="#fff" stroke-width=".8"/>`;
    // Ears or antenna
    if (hasEars) {
      svg += `<polygon points="-14,-24 -18,-36 -6,-28" fill="${color}" stroke="#fff" stroke-width="1.2"/>`;
      svg += `<polygon points="14,-24 18,-36 6,-28" fill="${color}" stroke="#fff" stroke-width="1.2"/>`;
      svg += `<polygon points="-13,-25 -16,-33 -8,-27" fill="#ffb4b4" opacity=".4"/>`;
      svg += `<polygon points="13,-25 16,-33 8,-27" fill="#ffb4b4" opacity=".4"/>`;
    }
    if (hasAntenna) {
      svg += `<line x1="0" y1="-30" x2="0" y2="-40" stroke="#888" stroke-width="1.5"/>`;
      svg += `<circle cx="0" cy="-42" r="3" fill="${color}" opacity=".8"/>`;
    }
    // Eyes
    if (eyeStyle === 0) {
      svg += `<circle cx="-7" cy="-12" r="4.5" fill="#fff"/><circle cx="7" cy="-12" r="4.5" fill="#fff"/>`;
      svg += `<circle cx="-6" cy="-12" r="2.5" fill="#222"/><circle cx="8" cy="-12" r="2.5" fill="#222"/>`;
      svg += `<circle cx="-5" cy="-13.5" r="1" fill="#fff"/><circle cx="9" cy="-13.5" r="1" fill="#fff"/>`;
    } else if (eyeStyle === 1) {
      svg += `<path d="M-10-12 Q-7-15-4-12" fill="none" stroke="#222" stroke-width="1.8" stroke-linecap="round"/>`;
      svg += `<path d="M4-12 Q7-15 10-12" fill="none" stroke="#222" stroke-width="1.8" stroke-linecap="round"/>`;
    } else {
      svg += `<circle cx="-7" cy="-12" r="4.5" fill="#fff"/><circle cx="7" cy="-12" r="4.5" fill="#fff"/>`;
      svg += `<text x="-7" y="-9.5" text-anchor="middle" fill="${color}" font-size="7" font-weight="bold">★</text>`;
      svg += `<text x="7" y="-9.5" text-anchor="middle" fill="${color}" font-size="7" font-weight="bold">★</text>`;
    }
    // Blush
    svg += `<ellipse cx="-12" cy="-7" rx="3" ry="2" fill="#ff9999" opacity=".25"/>`;
    svg += `<ellipse cx="12" cy="-7" rx="3" ry="2" fill="#ff9999" opacity=".25"/>`;
    // Mouth
    svg += `<path d="M-3-5 Q0-2 3-5" fill="none" stroke="#333" stroke-width="1.2" stroke-linecap="round"/>`;
    // Headphones
    svg += `<path d="M-17-14 Q-18-28 0-30 Q18-28 17-14" fill="none" stroke="#555" stroke-width="2"/>`;
    svg += `<rect x="-20" y="-18" width="6" height="10" rx="3" fill="#444" stroke="#555" stroke-width=".8"/>`;
    svg += `<rect x="14" y="-18" width="6" height="10" rx="3" fill="#444" stroke="#555" stroke-width=".8"/>`;
  }

  svg += '</svg>';
  return svg;
}

// ═══════════════════════════════════════════════════════
// VIEW SWITCHING
// ═══════════════════════════════════════════════════════
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-' + btn.dataset.view).classList.add('active');
    loadView(btn.dataset.view);
  });
});

function loadView(view) {
  switch(view) {
    case 'office': loadAgents().then(renderOffice); break;
    case 'chat': loadAgents().then(renderChatSidebar); break;
    case 'dashboard': loadDashboard(); break;
    case 'tasks': loadTasks(); break;
    case 'memory': loadMemory(); break;
    case 'traces': loadTraces(); break;
    case 'handoffs': loadHandoffs(); break;
  }
}

// ═══════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════
async function api(p) { try { return (await fetch(p)).json(); } catch { return []; } }
async function apiPost(p, b) { try { return (await fetch(p, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(b) })).json(); } catch(e) { return {error:e.message}; } }

function timeAgo(ts) {
  if (!ts) return '?';
  const d = typeof ts === 'number' ? new Date(ts*1000) : new Date(ts);
  const m = Math.floor((Date.now()-d.getTime())/60000);
  if (m<1) return 'now'; if (m<60) return m+'m';
  const h=Math.floor(m/60); if (h<24) return h+'h';
  return Math.floor(h/24)+'d';
}
function esc(s) { if(!s)return''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ═══════════════════════════════════════════════════════
// WEBSOCKET
// ═══════════════════════════════════════════════════════
function connectWS() {
  const proto = location.protocol==='https:'?'wss':'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen = () => { setWs('green','Connected'); };
  ws.onclose = () => { setWs('red','Disconnected'); setTimeout(connectWS,3000); };
  ws.onmessage = e => { try { handleWS(JSON.parse(e.data)); } catch{} };
}
function setWs(c,l) {
  document.getElementById('ws-dot').className = 'ws-dot '+c;
  document.getElementById('ws-label').textContent = l;
}
function handleWS(d) {
  switch(d.type) {
    case 'init': if(d.agents) agents=d.agents; renderOffice(); break;
    case 'agent_spawned': case 'agent_died': case 'agent_status':
      loadAgents().then(()=>{ renderOffice(); renderChatSidebar(); });
      break;
    case 'agent_response':
      if(d.agentId && d.content) addChatBubble(d.agentId,'agent',d.content);
      break;
    case 'message':
      if(d.from && d.content) addChatBubble(d.from,'agent',d.content);
      break;
  }
}

// ═══════════════════════════════════════════════════════
// AGENTS
// ═══════════════════════════════════════════════════════
async function loadAgents() { agents = await api('/api/agents'); return agents; }

function renderOffice() {
  const grid = document.getElementById('office-grid');
  const count = document.getElementById('office-count');
  count.textContent = agents.length > 0 ? `${agents.length} agent(s) running` : 'No agents running';

  if (agents.length === 0) {
    grid.innerHTML = `<div class="agent-card-empty">
      <span class="big-icon">🏢</span>
      The office is empty — spawn your first agent!
      <span class="sub">Click "+ Spawn Agent" to get started</span>
    </div>`;
    return;
  }

  grid.innerHTML = agents.map(a => {
    const color = agentColor(a.name);
    const icon = ROLE_ICONS[a.role] || '🤖';
    const statusCls = ['active','thinking','working','idle','stopped'].includes(a.status) ? a.status : 'idle';
    return `<div class="agent-card" onclick="goToChat('${a.id}')">
      <div class="agent-card-header">
        <div class="agent-card-avatar">${chibiSVG(a.name, 48)}</div>
        <div>
          <div class="agent-card-name" style="color:${color}">${icon} ${esc(a.name)}</div>
          <div class="agent-card-role">${esc(a.role)}</div>
          <div class="agent-card-status ${statusCls}">● ${a.status}</div>
        </div>
      </div>
      <div class="agent-card-actions">
        <button class="btn btn-sm" onclick="event.stopPropagation();goToChat('${a.id}')">💬 Chat</button>
        <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();stopAgent('${a.id}','${esc(a.name)}')">⏹ Stop</button>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════
// CHAT
// ═══════════════════════════════════════════════════════
function renderChatSidebar() {
  const el = document.getElementById('chat-agent-list');
  if (agents.length===0) {
    el.innerHTML = '<div class="empty-state" style="padding:20px"><span class="icon">🤖</span>No agents</div>';
    return;
  }
  el.innerHTML = agents.map(a => {
    const sel = a.id === selectedAgent;
    const dotColor = a.status==='active'?'var(--green)':a.status==='thinking'?'var(--accent)':a.status==='working'?'var(--yellow)':'var(--text-dim)';
    return `<div class="chat-agent-entry ${sel?'selected':''}" onclick="selectAgent('${a.id}')">
      <div class="entry-avatar">${chibiSVG(a.name,36)}</div>
      <div class="entry-info">
        <div class="entry-name" style="color:${agentColor(a.name)}">${esc(a.name)}</div>
        <div class="entry-role">${esc(a.role)} · ${esc(a.status)}</div>
      </div>
      <div class="entry-status-dot" style="background:${dotColor}"></div>
    </div>`;
  }).join('');
}

function selectAgent(id) {
  selectedAgent = id;
  const agent = agents.find(a=>a.id===id);
  if (!agent) return;

  document.getElementById('chat-empty').style.display='none';
  const active = document.getElementById('chat-active');
  active.style.display='flex';

  const color = agentColor(agent.name);
  const icon = ROLE_ICONS[agent.role]||'🤖';
  document.getElementById('chat-topbar').innerHTML = `
    <div class="avatar-mini">${chibiSVG(agent.name,28)}</div>
    <span class="name" style="color:${color}">${esc(agent.name)}</span>
    <span class="role-badge">${esc(agent.role)}</span>
    <span class="spacer"></span>
    <button class="btn btn-sm btn-danger" onclick="stopAgent('${id}','${esc(agent.name)}')">⏹ Stop</button>`;

  renderChatSidebar();

  if (!chatHistories[id]) {
    chatHistories[id] = [{ role:'system', content:`${icon} ${agent.name} (${agent.role}) is ready.`, time:new Date() }];
  }
  renderChat(id);
  document.getElementById('chat-input').focus();
}

function goToChat(id) {
  // Switch to chat tab
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelector('[data-view="chat"]').classList.add('active');
  document.getElementById('view-chat').classList.add('active');
  loadAgents().then(()=>{ renderChatSidebar(); selectAgent(id); });
}

function renderChat(id) {
  const container = document.getElementById('chat-messages');
  const msgs = chatHistories[id]||[];
  const agent = agents.find(a=>a.id===id);
  const color = agent ? agentColor(agent.name) : '#888';
  const icon = agent ? (ROLE_ICONS[agent.role]||'🤖') : '🤖';

  let html = '';
  for (const m of msgs) {
    const time = m.time ? new Date(m.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
    if (m.role==='system') {
      html += `<div class="msg-group system"><div class="msg-body"><div class="msg-bubble">${esc(m.content)}</div></div></div>`;
    } else if (m.role==='user') {
      html += `<div class="msg-group right">
        <div class="msg-avatar-col">${chibiSVG('human',36)}</div>
        <div class="msg-body">
          <div class="msg-meta right"><span class="tag human">You</span><span class="time">${time}</span></div>
          <div class="msg-bubble" style="background:rgba(232,184,109,0.1);border:1px solid rgba(232,184,109,0.2)">${esc(m.content)}</div>
        </div></div>`;
    } else {
      html += `<div class="msg-group left">
        <div class="msg-avatar-col">${chibiSVG(agent?.name||'agent',36)}</div>
        <div class="msg-body">
          <div class="msg-meta"><span class="sender-name" style="color:${color}">${esc(agent?.name||'Agent')}</span><span class="tag ai">AI</span><span class="time">${time}</span></div>
          <div class="msg-bubble" style="background:${color}12;border:1px solid ${color}25">${esc(m.content)}</div>
        </div></div>`;
    }
  }
  html += `<div class="typing-row" id="typing-row"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

function addChatBubble(id, role, content) {
  if (!chatHistories[id]) chatHistories[id]=[];
  chatHistories[id].push({role, content, time:new Date()});
  if (id===selectedAgent) renderChat(id);
  const ti = document.getElementById('typing-row');
  if (ti) ti.classList.remove('visible');
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !selectedAgent) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('chat-send-btn').disabled = true;
  addChatBubble(selectedAgent, 'user', text);

  const ti = document.getElementById('typing-row');
  if (ti) { ti.classList.add('visible'); document.getElementById('chat-messages').scrollTop = 99999; }

  try {
    const r = await apiPost(`/api/agents/${selectedAgent}/chat`, {message:text});
    if (r.response) addChatBubble(selectedAgent, 'agent', r.response);
    else if (r.error) addChatBubble(selectedAgent, 'system', `Error: ${r.error}`);
  } catch(e) {
    addChatBubble(selectedAgent, 'system', `Connection error: ${e.message}`);
  }
  if (ti) ti.classList.remove('visible');
  document.getElementById('chat-send-btn').disabled = false;
  input.focus();
}

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,120)+'px';
});

// ═══════════════════════════════════════════════════════
// SPAWN / STOP
// ═══════════════════════════════════════════════════════
function openModal() { document.getElementById('spawn-modal').classList.add('visible'); document.getElementById('m-name').focus(); }
function closeModal() { document.getElementById('spawn-modal').classList.remove('visible'); }
async function spawnAgent() {
  const name = document.getElementById('m-name').value.trim();
  const role = document.getElementById('m-role').value;
  const personality = document.getElementById('m-personality').value.trim();
  if (!name) { alert('Name required'); return; }
  const btn = document.getElementById('m-btn'); btn.disabled=true; btn.textContent='⏳ Spawning...';
  try {
    const r = await apiPost('/api/agents', {name, role, personality});
    if (r.error) alert('Error: '+r.error);
    else {
      closeModal();
      document.getElementById('m-name').value='';
      document.getElementById('m-personality').value='';
      await loadAgents(); renderOffice(); renderChatSidebar();
      if (r.id) goToChat(r.id);
    }
  } catch(e) { alert('Failed: '+e.message); }
  btn.disabled=false; btn.textContent='🚀 Spawn';
}
async function stopAgent(id, name) {
  if (!confirm(`Stop "${name}"?`)) return;
  await fetch(`/api/agents/${id}`, {method:'DELETE'});
  await loadAgents(); renderOffice(); renderChatSidebar();
  if (selectedAgent===id) {
    selectedAgent=null;
    document.getElementById('chat-empty').style.display='flex';
    document.getElementById('chat-active').style.display='none';
  }
}

// ═══════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════
async function loadDashboard() {
  try {
    const [health, stats] = await Promise.all([api('/api/health'), api('/api/stats')]);
    if (health.uptime) {
      const m = Math.floor(health.uptime/60);
      document.getElementById('uptime').textContent = m<60?`${m}m`:`${Math.floor(m/60)}h ${m%60}m`;
    }
    document.getElementById('metrics-grid').innerHTML = `
      <div class="metric-card"><div class="num">${stats.agents||0}</div><div class="label">Agents</div></div>
      <div class="metric-card"><div class="num" style="background:linear-gradient(135deg,var(--green),#81c784);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${stats.activeAgents||0}</div><div class="label">Active</div></div>
      <div class="metric-card"><div class="num" style="background:linear-gradient(135deg,var(--cyan),#4dd0e1);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${stats.memories||0}</div><div class="label">Memories</div></div>
      <div class="metric-card"><div class="num" style="background:linear-gradient(135deg,var(--blue),#64b5f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${stats.messages||0}</div><div class="label">Messages</div></div>
      <div class="metric-card"><div class="num" style="background:linear-gradient(135deg,var(--yellow),#fff176);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${stats.pendingTasks||0}</div><div class="label">Pending</div></div>
      <div class="metric-card"><div class="num" style="background:linear-gradient(135deg,var(--green),#81c784);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${stats.completedTasks||0}</div><div class="label">Done</div></div>
      <div class="metric-card"><div class="num" style="background:linear-gradient(135deg,var(--pink),#f48fb1);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${stats.threads||0}</div><div class="label">Threads</div></div>
      <div class="metric-card"><div class="num" style="background:linear-gradient(135deg,var(--orange),#ffb74d);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${stats.traces||0}</div><div class="label">Traces</div></div>`;

    const timeline = await api('/api/analytics/timeline?hours=24');
    document.getElementById('activity-timeline').innerHTML = timeline.length>0
      ? timeline.slice(0,20).map(e=>`<div class="timeline-entry">
          <span class="t-time">${timeAgo(e.created_at)}</span>
          <span class="t-dot" style="background:${e.type==='search'?'var(--blue)':e.type==='learn'?'var(--green)':'var(--accent)'}"></span>
          <span class="t-text"><strong>${esc(e.type)}</strong> ${esc(e.detail||'').slice(0,80)}</span>
        </div>`).join('')
      : '<div class="empty-state"><span class="icon">📭</span>No activity yet</div>';
  } catch {
    document.getElementById('activity-timeline').innerHTML = '<div class="empty-state"><span class="icon">🔌</span>Hub not reachable — run <code>npm start</code></div>';
  }
}

// ═══════════════════════════════════════════════════════
// TASKS
// ═══════════════════════════════════════════════════════
async function loadTasks() {
  const tasks = await api('/api/tasks');
  const p = tasks.filter(t=>t.status==='pending');
  const a = tasks.filter(t=>t.status==='active');
  const d = tasks.filter(t=>t.status==='completed'||t.status==='done');
  const tc = t => `<div class="kanban-item"><div class="title">${esc(t.title)}</div><div class="desc">${esc(t.description||'').slice(0,80)}</div></div>`;
  document.getElementById('task-kanban').innerHTML = `
    <div class="kanban-col"><h4><span style="width:6px;height:6px;border-radius:50%;background:var(--yellow);display:inline-block"></span> Pending (${p.length})</h4>${p.map(tc).join('')||'<div style="color:var(--text-dim);font-size:11px;padding:8px">Empty</div>'}</div>
    <div class="kanban-col"><h4><span style="width:6px;height:6px;border-radius:50%;background:var(--orange);display:inline-block"></span> Active (${a.length})</h4>${a.map(tc).join('')||'<div style="color:var(--text-dim);font-size:11px;padding:8px">Empty</div>'}</div>
    <div class="kanban-col"><h4><span style="width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block"></span> Done (${d.length})</h4>${d.map(tc).join('')||'<div style="color:var(--text-dim);font-size:11px;padding:8px">Empty</div>'}</div>`;
}

// ═══════════════════════════════════════════════════════
// MEMORY
// ═══════════════════════════════════════════════════════
async function loadMemory() {
  const mems = await api('/api/memory/all?limit=30');
  const el = document.getElementById('mem-list');
  if (mems.length===0) { el.innerHTML='<div class="empty-state"><span class="icon">🧠</span>No memories yet</div>'; return; }
  el.innerHTML='<table class="data-table"><tr><th>ID</th><th>Category</th><th>Content</th><th>Importance</th><th>When</th></tr>'+mems.map(m=>`<tr><td>${m.id}</td><td>${esc(m.category)}</td><td style="max-width:300px;overflow:hidden;text-overflow:ellipsis">${esc(m.content).slice(0,100)}</td><td>${'⭐'.repeat(Math.min(m.importance||1,5))}</td><td>${timeAgo(m.created_at)}</td></tr>`).join('')+'</table>';
}
async function searchMem() {
  const q = document.getElementById('mem-q').value;
  if (!q) return loadMemory();
  const r = await api(`/api/memory/search?q=${encodeURIComponent(q)}&limit=20`);
  const el = document.getElementById('mem-list');
  if (r.length===0) { el.innerHTML='<div class="empty-state">No results</div>'; return; }
  el.innerHTML=`<p style="margin-bottom:10px;font-size:11px;color:var(--text-dim)">${r.length} result(s)</p><table class="data-table"><tr><th>ID</th><th>Category</th><th>Content</th><th>When</th></tr>${r.map(m=>`<tr><td>${m.id}</td><td>${esc(m.category)}</td><td>${esc(m.content).slice(0,120)}</td><td>${timeAgo(m.created_at)}</td></tr>`).join('')}</table>`;
}

// ═══════════════════════════════════════════════════════
// TRACES
// ═══════════════════════════════════════════════════════
async function loadTraces() {
  const t = await api('/api/traces?limit=20');
  const el = document.getElementById('traces-list');
  if (t.length===0) { el.innerHTML='<div class="empty-state"><span class="icon">🔍</span>No traces yet</div>'; return; }
  el.innerHTML='<table class="data-table"><tr><th>Trace ID</th><th>Query</th><th>Type</th><th>Status</th><th>Created</th></tr>'+t.map(tr=>`<tr><td style="font-size:10px;color:var(--accent)">${esc(tr.trace_id)}</td><td>${esc(tr.query).slice(0,50)}</td><td>${esc(tr.query_type)}</td><td>${esc(tr.status)}</td><td>${timeAgo(tr.created_at)}</td></tr>`).join('')+'</table>';
}

// ═══════════════════════════════════════════════════════
// HANDOFFS
// ═══════════════════════════════════════════════════════
async function loadHandoffs() {
  const h = await api('/api/handoff?limit=10');
  const el = document.getElementById('handoffs-list');
  if (h.length===0) { el.innerHTML='<div class="empty-state"><span class="icon">🔀</span>No handoffs yet</div>'; return; }
  el.innerHTML = h.map(ho=>`<div class="card"><h4>${esc(ho.title)}</h4><p>${esc(ho.summary).slice(0,300)}</p><div class="meta"><span>${timeAgo(ho.created_at)}</span><span>${esc(ho.status)}</span></div></div>`).join('');
}
async function createHandoff() {
  await apiPost('/api/handoff/create', {title:'Manual handoff', summary:'User-created handoff'});
  loadHandoffs();
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
connectWS();
loadAgents().then(renderOffice);
setInterval(() => { const v=document.querySelector('.nav-btn.active'); if(v) loadView(v.dataset.view); }, 8000);

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
document.getElementById('spawn-modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
</script>
</body>
