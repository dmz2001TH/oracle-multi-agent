<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oracle Multi-Agent Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a2e;
      --border: #1e1e2e;
      --text: #e0e0e0;
      --text-dim: #888;
      --accent: #7c3aed;
      --accent-glow: rgba(124, 58, 237, 0.3);
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --blue: #3b82f6;
      --orange: #f97316;
    }
    body {
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 {
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header .meta {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-dim);
      align-items: center;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.red { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .dot.yellow { background: var(--yellow); }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      overflow-x: auto;
    }
    .tab {
      padding: 10px 18px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-dim);
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
      font-family: inherit;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab .badge {
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 8px;
      margin-left: 6px;
    }

    /* Content */
    .content { padding: 20px; }
    .panel { display: none; }
    .panel.active { display: block; }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      text-align: center;
    }
    .stat-card .num {
      font-size: 28px;
      font-weight: bold;
      color: var(--accent);
    }
    .stat-card .label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: 8px;
      overflow: hidden;
      font-size: 13px;
    }
    th {
      text-align: left;
      padding: 10px 14px;
      background: var(--surface2);
      color: var(--text-dim);
      font-weight: normal;
      font-size: 11px;
      text-transform: uppercase;
    }
    td {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
    }
    tr:hover td { background: rgba(124, 58, 237, 0.05); }

    /* Status badges */
    .badge-status {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
    }
    .badge-active { background: rgba(34, 197, 94, 0.15); color: var(--green); }
    .badge-pending { background: rgba(234, 179, 8, 0.15); color: var(--yellow); }
    .badge-completed { background: rgba(59, 130, 246, 0.15); color: var(--blue); }
    .badge-working { background: rgba(249, 115, 22, 0.15); color: var(--orange); }
    .badge-stopped { background: rgba(239, 68, 68, 0.15); color: var(--red); }
    .badge-raw { background: rgba(136, 136, 136, 0.15); color: var(--text-dim); }
    .badge-distilled { background: rgba(124, 58, 237, 0.15); color: var(--accent); }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card h3 {
      font-size: 14px;
      margin-bottom: 8px;
      color: var(--text);
    }
    .card p {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.5;
    }
    .card .meta-row {
      display: flex;
      gap: 16px;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 8px;
    }

    /* Message bubbles */
    .msg {
      padding: 8px 12px;
      margin: 4px 0;
      border-radius: 6px;
      font-size: 12px;
      border-left: 3px solid var(--border);
    }
    .msg.agent { border-left-color: var(--accent); }
    .msg.human { border-left-color: var(--green); }
    .msg.system { border-left-color: var(--yellow); }
    .msg .who {
      font-weight: bold;
      font-size: 11px;
      margin-bottom: 2px;
    }
    .msg .when {
      font-size: 10px;
      color: var(--text-dim);
      float: right;
    }

    /* Kanban */
    .kanban {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .kanban-col {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }
    .kanban-col h3 {
      font-size: 12px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .kanban-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .kanban-card .title { font-weight: bold; margin-bottom: 4px; }
    .kanban-card .desc { color: var(--text-dim); font-size: 11px; }

    /* Timeline */
    .timeline-item {
      display: flex;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .timeline-item .time {
      color: var(--text-dim);
      min-width: 60px;
      font-size: 11px;
    }
    .timeline-item .dot {
      margin-top: 4px;
    }

    /* Search */
    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .search-bar input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
    }
    .search-bar input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .search-bar button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 40px;
      color: var(--text-dim);
      font-size: 13px;
    }
    .empty .icon { font-size: 32px; margin-bottom: 8px; }

    /* Log */
    .log-entry {
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      display: flex;
      gap: 8px;
    }
    .log-entry .time { color: var(--text-dim); min-width: 80px; }
    .log-entry .type { min-width: 70px; }
    .log-entry .type.search { color: var(--blue); }
    .log-entry .type.learn { color: var(--green); }
    .log-entry .type.message { color: var(--accent); }

    @media (max-width: 768px) {
      .kanban { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🧠 Oracle Multi-Agent Dashboard</h1>
    <div class="meta">
      <span><span class="dot" id="ws-dot"></span> <span id="ws-status">Connecting...</span></span>
      <span>Uptime: <span id="uptime">--</span></span>
      <span>v2.0</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-panel="overview">📊 Overview</button>
    <button class="tab" data-panel="agents">🤖 Agents</button>
    <button class="tab" data-panel="threads">💬 Threads <span class="badge" id="thread-count"></span></button>
    <button class="tab" data-panel="messages">📨 Messages</button>
    <button class="tab" data-panel="tasks">📋 Tasks</button>
    <button class="tab" data-panel="traces">🔍 Traces</button>
    <button class="tab" data-panel="memory">🧠 Memory</button>
    <button class="tab" data-panel="handoffs">🔀 Handoffs</button>
    <button class="tab" data-panel="analytics">📈 Analytics</button>
  </div>

  <div class="content">
    <!-- Overview -->
    <div class="panel active" id="panel-overview">
      <div class="stats-grid" id="stats-grid"></div>
      <h3 style="margin: 16px 0 8px; font-size: 14px;">Recent Activity</h3>
      <div id="activity-timeline"></div>
    </div>

    <!-- Agents -->
    <div class="panel" id="panel-agents">
      <div id="agents-list"></div>
    </div>

    <!-- Threads -->
    <div class="panel" id="panel-threads">
      <div id="threads-list"></div>
    </div>

    <!-- Messages -->
    <div class="panel" id="panel-messages">
      <div class="search-bar">
        <input type="text" id="msg-search" placeholder="Search messages...">
        <button onclick="searchMessages()">Search</button>
      </div>
      <div id="messages-list"></div>
    </div>

    <!-- Tasks (Kanban) -->
    <div class="panel" id="panel-tasks">
      <div class="kanban" id="task-kanban"></div>
    </div>

    <!-- Traces -->
    <div class="panel" id="panel-traces">
      <div id="traces-list"></div>
    </div>

    <!-- Memory -->
    <div class="panel" id="panel-memory">
      <div class="search-bar">
        <input type="text" id="mem-search" placeholder="Search memories (FTS5)...">
        <button onclick="searchMemories()">Search</button>
      </div>
      <div id="memory-list"></div>
    </div>

    <!-- Handoffs -->
    <div class="panel" id="panel-handoffs">
      <div id="handoffs-list"></div>
    </div>

    <!-- Analytics -->
    <div class="panel" id="panel-analytics">
      <div class="card">
        <h3>Search Performance</h3>
        <div id="search-stats"></div>
      </div>
      <h3 style="margin: 16px 0 8px; font-size: 14px;">Activity Log</h3>
      <div id="activity-log"></div>
    </div>
  </div>

  <script>
    const API = '';
    let ws;
    let refreshTimer;

    // ─── Tab Navigation ──────────────────────────────
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
        loadPanelData(tab.dataset.panel);
      });
    });

    // ─── WebSocket ───────────────────────────────────
    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}`);
      ws.onopen = () => {
        document.getElementById('ws-dot').className = 'dot green';
        document.getElementById('ws-status').textContent = 'Connected';
      };
      ws.onclose = () => {
        document.getElementById('ws-dot').className = 'dot red';
        document.getElementById('ws-status').textContent = 'Disconnected';
        setTimeout(connectWS, 3000);
      };
      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        handleWSMessage(data);
      };
    }

    function handleWSMessage(data) {
      switch (data.type) {
        case 'init':
          updateStats(data.stats);
          break;
        case 'agent_spawned':
        case 'agent_response':
        case 'agent_status':
        case 'agent_thought':
        case 'agent_died':
        case 'message':
        case 'thread_created':
        case 'trace_created':
        case 'task_created':
        case 'handoff_created':
          // Refresh current panel
          const activeTab = document.querySelector('.tab.active');
          if (activeTab) loadPanelData(activeTab.dataset.panel);
          // Also refresh overview
          loadOverview();
          break;
      }
    }

    // ─── API Helpers ─────────────────────────────────
    async function api(path) {
      const res = await fetch(API + path);
      return res.json();
    }

    async function apiPost(path, body) {
      const res = await fetch(API + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      return res.json();
    }

    // ─── Helpers ─────────────────────────────────────
    function timeAgo(ts) {
      if (!ts) return '?';
      const d = typeof ts === 'number' ? new Date(ts * 1000) : new Date(ts);
      const diff = Date.now() - d.getTime();
      const m = Math.floor(diff / 60000);
      if (m < 1) return 'now';
      if (m < 60) return m + 'm';
      const h = Math.floor(m / 60);
      if (h < 24) return h + 'h';
      return Math.floor(h / 24) + 'd';
    }

    function esc(s) {
      if (!s) return '';
      return s.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function statusBadge(status) {
      const cls = `badge-${status}` || 'badge-raw';
      return `<span class="badge-status ${cls}">${esc(status)}</span>`;
    }

    // ─── Panel Loaders ───────────────────────────────
    function loadPanelData(panel) {
      switch (panel) {
        case 'overview': loadOverview(); break;
        case 'agents': loadAgents(); break;
        case 'threads': loadThreads(); break;
        case 'messages': loadMessages(); break;
        case 'tasks': loadTasks(); break;
        case 'traces': loadTraces(); break;
        case 'memory': loadMemory(); break;
        case 'handoffs': loadHandoffs(); break;
        case 'analytics': loadAnalytics(); break;
      }
    }

    function updateStats(s) {
      if (!s) return;
      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card"><div class="num">${s.agents || 0}</div><div class="label">Agents</div></div>
        <div class="stat-card"><div class="num">${s.activeAgents || 0}</div><div class="label">Active</div></div>
        <div class="stat-card"><div class="num">${s.memories || 0}</div><div class="label">Memories</div></div>
        <div class="stat-card"><div class="num">${s.messages || 0}</div><div class="label">Messages</div></div>
        <div class="stat-card"><div class="num">${s.pendingTasks || 0}</div><div class="label">Pending Tasks</div></div>
        <div class="stat-card"><div class="num">${s.completedTasks || 0}</div><div class="label">Completed</div></div>
        <div class="stat-card"><div class="num">${s.threads || 0}</div><div class="label">Threads</div></div>
        <div class="stat-card"><div class="num">${s.traces || 0}</div><div class="label">Traces</div></div>
        <div class="stat-card"><div class="num">${s.superseded || 0}</div><div class="label">Superseded</div></div>
      `;
    }

    async function loadOverview() {
      try {
        const [health, stats] = await Promise.all([api('/api/health'), api('/api/stats')]);
        updateStats(stats);
        if (health.uptime) {
          const m = Math.floor(health.uptime / 60);
          document.getElementById('uptime').textContent = m < 60 ? `${m}m` : `${Math.floor(m/60)}h ${m%60}m`;
        }
        const timeline = await api('/api/analytics/timeline?hours=24');
        document.getElementById('activity-timeline').innerHTML = timeline.length > 0
          ? timeline.slice(0, 15).map(e => `
            <div class="timeline-item">
              <span class="time">${timeAgo(e.created_at)}</span>
              <span class="dot ${e.type === 'search' ? 'blue' : e.type === 'learn' ? 'green' : 'accent'}" style="width:6px;height:6px;border-radius:50%;display:inline-block;margin-top:5px;background:${e.type === 'search' ? 'var(--blue)' : e.type === 'learn' ? 'var(--green)' : 'var(--accent)'}"></span>
              <span><strong>${esc(e.type)}</strong> ${esc(e.detail || '').slice(0, 80)}</span>
            </div>`).join('')
          : '<div class="empty"><div class="icon">📭</div>No activity yet</div>';
      } catch (e) {
        document.getElementById('activity-timeline').innerHTML = '<div class="empty"><div class="icon">🔌</div>Hub not reachable</div>';
      }
    }

    async function loadAgents() {
      const agents = await api('/api/agents');
      const el = document.getElementById('agents-list');
      if (agents.length === 0) {
        el.innerHTML = '<div class="empty"><div class="icon">🤖</div>No agents yet. Spawn one via CLI: oracle team spawn</div>';
        return;
      }
      el.innerHTML = '<table><tr><th>Name</th><th>Role</th><th>Status</th><th>Last Active</th><th>ID</th></tr>' +
        agents.map(a => `<tr>
          <td><strong>${esc(a.name)}</strong></td>
          <td>${esc(a.role)}</td>
          <td>${statusBadge(a.status)}</td>
          <td>${timeAgo(a.last_active)}</td>
          <td style="color:var(--text-dim);font-size:11px">${a.id.slice(0, 8)}...</td>
        </tr>`).join('') + '</table>';
    }

    async function loadThreads() {
      const threads = await api('/api/threads?limit=20');
      const el = document.getElementById('threads-list');
      document.getElementById('thread-count').textContent = threads.length || '';
      if (threads.length === 0) {
        el.innerHTML = '<div class="empty"><div class="icon">💬</div>No threads yet</div>';
        return;
      }
      el.innerHTML = '<table><tr><th>ID</th><th>Title</th><th>Status</th><th>Created By</th><th>Assigned</th><th>Updated</th></tr>' +
        threads.map(t => `<tr>
          <td>#${t.id}</td>
          <td><strong>${esc(t.title)}</strong></td>
          <td>${statusBadge(t.status)}</td>
          <td>${esc(t.created_by || '-')}</td>
          <td>${esc(t.assigned_to || '-')}</td>
          <td>${timeAgo(t.updated_at)}</td>
        </tr>`).join('') + '</table>';
    }

    async function loadMessages() {
      const msgs = await api('/api/messages?limit=30');
      const el = document.getElementById('messages-list');
      if (msgs.length === 0) {
        el.innerHTML = '<div class="empty"><div class="icon">📨</div>No messages yet</div>';
        return;
      }
      el.innerHTML = msgs.map(m => `
        <div class="msg ${m.role || 'agent'}">
          <span class="when">${timeAgo(m.created_at)}</span>
          <div class="who">${esc(m.from_agent)} ${m.to_agent ? '→ ' + esc(m.to_agent) : ''}</div>
          ${esc(m.content)}
        </div>`).join('');
    }

    async function searchMessages() {
      const q = document.getElementById('msg-search').value;
      if (!q) return loadMessages();
      const results = await api(`/api/messages/search?q=${encodeURIComponent(q)}`);
      const el = document.getElementById('messages-list');
      if (results.length === 0) {
        el.innerHTML = '<div class="empty">No results for "' + esc(q) + '"</div>';
        return;
      }
      el.innerHTML = `<p style="margin-bottom:12px;font-size:12px;color:var(--text-dim)">${results.length} result(s) for "${esc(q)}"</p>` +
        results.map(m => `<div class="msg ${m.role || 'agent'}">
          <span class="when">${timeAgo(m.created_at)}</span>
          <div class="who">${esc(m.from_agent)} ${m.to_agent ? '→ ' + esc(m.to_agent) : ''}</div>
          ${esc(m.content)}
        </div>`).join('');
    }

    async function loadTasks() {
      const tasks = await api('/api/tasks');
      const pending = tasks.filter(t => t.status === 'pending');
      const active = tasks.filter(t => t.status === 'active');
      const completed = tasks.filter(t => t.status === 'completed' || t.status === 'done');

      function taskCard(t) {
        return `<div class="kanban-card">
          <div class="title">${esc(t.title)}</div>
          <div class="desc">${esc(t.description || '').slice(0, 80)}</div>
          <div style="margin-top:6px;font-size:10px;color:var(--text-dim)">
            ${t.assigned_to ? '👤 ' + esc(t.assigned_to) : ''} ${t.priority ? '⚡ P' + t.priority : ''}
          </div>
        </div>`;
      }

      document.getElementById('task-kanban').innerHTML = `
        <div class="kanban-col">
          <h3><span class="dot" style="background:var(--yellow)"></span> Pending (${pending.length})</h3>
          ${pending.map(taskCard).join('') || '<div style="color:var(--text-dim);font-size:12px;padding:8px">No pending tasks</div>'}
        </div>
        <div class="kanban-col">
          <h3><span class="dot" style="background:var(--orange)"></span> Active (${active.length})</h3>
          ${active.map(taskCard).join('') || '<div style="color:var(--text-dim);font-size:12px;padding:8px">No active tasks</div>'}
        </div>
        <div class="kanban-col">
          <h3><span class="dot" style="background:var(--green)"></span> Completed (${completed.length})</h3>
          ${completed.map(taskCard).join('') || '<div style="color:var(--text-dim);font-size:12px;padding:8px">No completed tasks</div>'}
        </div>`;
    }

    async function loadTraces() {
      const traces = await api('/api/traces?limit=20');
      const el = document.getElementById('traces-list');
      if (traces.length === 0) {
        el.innerHTML = '<div class="empty"><div class="icon">🔍</div>No traces yet</div>';
        return;
      }
      el.innerHTML = '<table><tr><th>Trace ID</th><th>Query</th><th>Type</th><th>Status</th><th>Depth</th><th>Created</th></tr>' +
        traces.map(t => `<tr>
          <td style="font-size:11px;color:var(--accent)">${esc(t.trace_id)}</td>
          <td>${esc(t.query).slice(0, 50)}</td>
          <td>${esc(t.query_type)}</td>
          <td>${statusBadge(t.status)}</td>
          <td>${t.depth || 0}</td>
          <td>${timeAgo(t.created_at)}</td>
        </tr>`).join('') + '</table>';
    }

    async function loadMemory() {
      const memories = await api('/api/memory/all?limit=30');
      const el = document.getElementById('memory-list');
      if (memories.length === 0) {
        el.innerHTML = '<div class="empty"><div class="icon">🧠</div>No memories yet</div>';
        return;
      }
      el.innerHTML = '<table><tr><th>ID</th><th>Category</th><th>Content</th><th>Importance</th><th>Agent</th><th>When</th></tr>' +
        memories.map(m => `<tr>
          <td>${m.id}</td>
          <td><span class="badge-status badge-active">${esc(m.category)}</span></td>
          <td style="max-width:300px">${esc(m.content).slice(0, 100)}${m.content.length > 100 ? '...' : ''}</td>
          <td>${'⭐'.repeat(Math.min(m.importance || 1, 5))}</td>
          <td>${esc(m.agent_id?.slice(0, 8) || '-')}</td>
          <td>${timeAgo(m.created_at)}</td>
        </tr>`).join('') + '</table>';
    }

    async function searchMemories() {
      const q = document.getElementById('mem-search').value;
      if (!q) return loadMemory();
      const results = await api(`/api/memory/search?q=${encodeURIComponent(q)}&limit=20`);
      const el = document.getElementById('memory-list');
      if (results.length === 0) {
        el.innerHTML = '<div class="empty">No results for "' + esc(q) + '"</div>';
        return;
      }
      el.innerHTML = `<p style="margin-bottom:12px;font-size:12px;color:var(--text-dim)">${results.length} result(s) for "${esc(q)}"</p>` +
        '<table><tr><th>ID</th><th>Category</th><th>Content</th><th>Importance</th><th>When</th></tr>' +
        results.map(m => `<tr>
          <td>${m.id}</td>
          <td><span class="badge-status badge-active">${esc(m.category)}</span></td>
          <td style="max-width:300px">${esc(m.content).slice(0, 120)}</td>
          <td>${'⭐'.repeat(Math.min(m.importance || 1, 5))}</td>
          <td>${timeAgo(m.created_at)}</td>
        </tr>`).join('') + '</table>';
    }

    async function loadHandoffs() {
      const handoffs = await api('/api/handoff?limit=10');
      const el = document.getElementById('handoffs-list');
      if (handoffs.length === 0) {
        el.innerHTML = '<div class="empty"><div class="icon">🔀</div>No handoffs yet. Create one via: oracle handoff</div>';
        return;
      }
      el.innerHTML = handoffs.map(h => `
        <div class="card">
          <h3>${esc(h.title)} ${statusBadge(h.status)}</h3>
          <p>${esc(h.summary).slice(0, 300)}</p>
          <div class="meta-row">
            <span>${timeAgo(h.created_at)}</span>
            ${h.from_session ? '<span>From: ' + esc(h.from_session) + '</span>' : ''}
          </div>
        </div>`).join('');
    }

    async function loadAnalytics() {
      try {
        const stats = await api('/api/analytics/search');
        document.getElementById('search-stats').innerHTML = stats.total_searches
          ? `<p>Total searches: <strong>${stats.total_searches}</strong> | Avg time: <strong>${(stats.avg_time_ms || 0).toFixed(1)}ms</strong> | Avg results: <strong>${(stats.avg_results || 0).toFixed(1)}</strong></p>`
          : '<p style="color:var(--text-dim)">No search data yet</p>';
      } catch {}

      try {
        const timeline = await api('/api/analytics/timeline?hours=72');
        document.getElementById('activity-log').innerHTML = timeline.length > 0
          ? timeline.slice(0, 30).map(e => `
            <div class="log-entry">
              <span class="time">${timeAgo(e.created_at)}</span>
              <span class="type ${e.type}">${e.type}</span>
              <span>${esc(e.detail || '').slice(0, 80)}</span>
            </div>`).join('')
          : '<div class="empty">No activity logged yet</div>';
      } catch {}
    }

    // ─── Init ────────────────────────────────────────
    connectWS();
    loadOverview();
    refreshTimer = setInterval(() => {
      const activeTab = document.querySelector('.tab.active');
      if (activeTab) loadPanelData(activeTab.dataset.panel);
    }, 10000);
  </script>
</body>
</html>
